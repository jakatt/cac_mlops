version: "3.9"

services:

  # ── PostgreSQL — backend MLflow + logs prédictions ──────────────────────────
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB:       ${POSTGRES_DB:-mlops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO — stockage local compatible S3 (artefacts MLflow + DVC) ───────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"   # console UI → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow — tracking server ─────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"   # UI → http://localhost:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── API — FastAPI inference service ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME:   rf_accidents
      MLFLOW_MODEL_STAGE:  Production
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:   ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LOCAL_MODEL_PATH:    src/models/trained_model.joblib   # fallback si MLflow vide
    ports:
      - "8080:8000"   # API → http://localhost:8080/docs (8000 réservé au rag-api)
    volumes:
      - ./src:/app/src:ro                    # pour le fallback local joblib
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prefect — orchestration [Phase 3] ───────────────────────────────────────
  # prefect:
  #   image: prefecthq/prefect:2-python3.11
  #   command: prefect server start --host 0.0.0.0
  #   ports:
  #     - "4200:4200"

  # ── Prometheus — métriques [Phase 4] ────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana — dashboards [Phase 4] ──────────────────────────────────────────
  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:
  minio_data:
