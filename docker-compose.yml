services:

  # ── PostgreSQL — backend MLflow + logs prédictions ──────────────────────────
  postgresql:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB:       ${POSTGRES_DB:-mlops}
    volumes:
      - ${DOCKER_VOLUMES_PATH:-./volumes}/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO — stockage local compatible S3 (artefacts MLflow + DVC) ───────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"   # console UI → http://localhost:9001
    volumes:
      - ${DOCKER_VOLUMES_PATH:-./volumes}/minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO init — crée le bucket mlflow au premier démarrage ─────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} && mc mb local/mlflow --ignore-existing && echo 'Bucket mlflow OK'"
    restart: "no"

  # ── MLflow — tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/jakatt/cac-mlops-mlflow:latest
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5001:5000"   # UI → http://localhost:5001 (5000 réservé AirPlay macOS)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── API — FastAPI inference service ─────────────────────────────────────────
  api:
    image: ghcr.io/jakatt/cac-mlops-api:latest
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_MODEL_STAGE:     Production
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      LOCAL_MODEL_PATH:       src/models/trained_model.joblib
      JWT_SECRET_KEY:         ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      API_USERNAME:           ${API_USERNAME:-admin}
      API_PASSWORD:           ${API_PASSWORD:-changeme}
    ports:
      - "8080:8000"   # direct access (admin / healthcheck)
    volumes:
      - ./src:/app/src:ro
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── NGINX — reverse proxy + rate limiting [Phase 3] ─────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8090:80"   # production entry point (rate-limited) — port 80 on host taken by system service
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./reports:/srv/reports:ro   # Evidently drift reports (HTML statique)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prefect server — UI orchestration [Phase 3] ─────────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_UI_API_URL: http://51.159.187.132:4200/api
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Prefect worker — exécute les flows (image api = toutes les dépendances ML)
  prefect-worker:
    image: ghcr.io/jakatt/cac-mlops-api:latest
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        prefect work-pool create default-process-pool --type process 2>/dev/null || true
        prefect worker start --pool default-process-pool
    environment:
      PREFECT_API_URL:        http://prefect-server:4200/api
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      POSTGRES_USER:          ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB:            ${POSTGRES_DB:-mlops}
      POSTGRES_HOST:          postgresql
      API_URL:                http://api:8000
      API_USERNAME:           ${API_USERNAME:-admin}
      API_PASSWORD:           ${API_PASSWORD:-changeme}
      MLFLOW_RUN_MODE:        official
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./.git:/app/.git:ro
    depends_on:
      prefect-server:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  # ── Gradio — Cockpit MLOps (6 onglets) ──────────────────────────────────────
  gradio:
    image: ghcr.io/jakatt/cac-mlops-gradio:latest
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      GRADIO_MODEL_ALIAS:     Production
      GRADIO_DATA_PATH:       /app/data/preprocessed
      GRADIO_PORT:            "7860"
      # Cockpit onglets 3-6
      VPS_IP:                 ${VPS_IP:-51.159.187.132}
      GITHUB_REPO:            ${GITHUB_REPO:-jakatt/cac_mlops}
      REPORTS_PATH:           /app/reports/drift
      KAPSULE_STATE:          /app/state/kapsule_ips
    ports:
      - "7860:7860"   # UI → http://localhost:7860
    volumes:
      - ./data:/app/data:ro        # données préprocessées (read-only)
      - ./reports:/app/reports:ro  # rapports Evidently (read-only)
      - ./state:/app/state:ro      # IPs Kapsule dynamiques (read-only)

  # ── Prometheus — métriques [Phase 4] ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - api

  # ── Grafana — dashboards [Phase 4] ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api-performance.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:   # named volume — Docker gère les permissions (UID 65534)
  grafana_data:      # named volume — Docker gère les permissions (UID 472)
  prefect_data:      # named volume — SQLite Prefect + config

# MinIO et Postgres utilisent des bind mounts sur /data (block storage Scaleway)
# DOCKER_VOLUMES_PATH=/data dans .env sur le serveur → block storage (19 GB)
# En local, DOCKER_VOLUMES_PATH non défini → ./volumes (ignoré par git)
