services:

  # ── PostgreSQL — backend MLflow + logs prédictions ──────────────────────────
  postgresql:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB:       ${POSTGRES_DB:-mlops}
    volumes:
      - ${DOCKER_VOLUMES_PATH:-./volumes}/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO — stockage local compatible S3 (artefacts MLflow + DVC) ───────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:9000:9000"
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:9001:9001"  # console UI → http://[tailscale-ip]:9001
    volumes:
      - ${DOCKER_VOLUMES_PATH:-./volumes}/minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO init — crée le bucket mlflow au premier démarrage ─────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} && mc mb local/mlflow --ignore-existing && echo 'Bucket mlflow OK'"
    restart: "no"

  # ── MLflow — tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/jakatt/cac-mlops-mlflow:latest
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow,mlflow:5000,localhost,127.0.0.1,${VPS_TAILSCALE_IP:-127.0.0.1},${VPS_TAILSCALE_IP:-127.0.0.1}:5001
      --cors-allowed-origins http://${VPS_TAILSCALE_IP:-127.0.0.1}:5001
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:5001:5000"  # UI → http://[tailscale-ip]:5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── API — FastAPI inference service ─────────────────────────────────────────
  api:
    image: ghcr.io/jakatt/cac-mlops-api:latest
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_MODEL_STAGE:     Production
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      LOCAL_MODEL_PATH:       src/models/trained_model.joblib
      JWT_SECRET_KEY:         ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      API_USERNAME:           ${API_USERNAME:-admin}
      API_PASSWORD:           ${API_PASSWORD:-changeme}
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:8080:8000"  # direct access (admin/healthcheck) — Tailscale only
    volumes:
      - ./src:/app/src:ro
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── NGINX — reverse proxy + rate limiting [Phase 3] ─────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - gradio-public
    ports:
      - "127.0.0.1:8090:80"   # localhost only — Caddy proxy uniquement, pas d'accès HTTP direct depuis internet
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./reports:/srv/reports:ro   # Evidently drift reports (HTML statique)
      - ./docs:/srv/ci-docs:ro      # Documentation HTML statique (fiabilité CI/CD)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Prefect server — UI orchestration [Phase 3] ─────────────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_UI_API_URL: http://${VPS_TAILSCALE_IP:-127.0.0.1}:4200/api
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Prefect worker — exécute les flows (image api = toutes les dépendances ML)
  prefect-worker:
    image: ghcr.io/jakatt/cac-mlops-api:latest
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        prefect work-pool create default-process-pool --type process 2>/dev/null || true
        prefect worker start --pool default-process-pool
    environment:
      PREFECT_API_URL:        http://prefect-server:4200/api
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      POSTGRES_USER:          ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB:            ${POSTGRES_DB:-mlops}
      POSTGRES_HOST:          postgresql
      API_URL:                http://api:8000
      API_USERNAME:           ${API_USERNAME:-admin}
      API_PASSWORD:           ${API_PASSWORD:-changeme}
      MLFLOW_RUN_MODE:        official
      SCW_ACCESS_KEY_ID:      ${SCW_ACCESS_KEY_ID}
      SCW_SECRET_ACCESS_KEY:  ${SCW_SECRET_ACCESS_KEY}
      KAPSULE_CLUSTER_ID:     ${KAPSULE_CLUSTER_ID:-}
      SCW_DEFAULT_ORGANIZATION_ID: ${SCW_DEFAULT_ORGANIZATION_ID:-}
      KAPSULE_STATE:          /app/state/kapsule_ips
      NGINX_URL:              http://nginx:80
      # Deploy VPS flow — authentification ghcr.io pour docker compose pull
      GHCR_TOKEN:             ${GHCR_TOKEN:-}
      GHCR_USER:              ${GHCR_USER:-jakatt}
      # Rollback Docker T2 — chemin projet sur le host pour docker compose up -d
      COMPOSE_PROJECT_DIR:    ${COMPOSE_PROJECT_DIR:-/home/deploy/cac_mlops}
      # Alertes email (même config que Grafana SMTP)
      SMTP_HOST:              ${GF_SMTP_HOST:-smtp.gmail.com:587}
      SMTP_USER:              ${GF_SMTP_USER:-}
      SMTP_PASSWORD:          ${GF_SMTP_PASSWORD:-}
      SMTP_FROM:              ${GF_SMTP_FROM_ADDRESS:-no-reply@cac-mlops.local}
      ALERT_EMAIL:            ${GF_ALERT_EMAIL:-}
    volumes:
      - ./src:/app/src:ro                                              # flows Prefect (override image baked-in)
      - ./services/monitoring:/app/services/monitoring:ro             # drift_detection.py (override image baked-in)
      - ./config:/app/config                                           # blueprint hyperparamètres (rw — extract_blueprint.py écrit ici)
      - ./prefect.yaml:/app/prefect.yaml:ro                           # deployments (override image baked-in)
      - ./data:/app/data
      - ./reports:/app/reports
      - ./state:/app/state
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro               # rollback Docker T2 (docker compose up -d)
    depends_on:
      prefect-server:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  # ── Gradio — Cockpit MLOps (8 onglets) ──────────────────────────────────────
  gradio:
    image: ghcr.io/jakatt/cac-mlops-gradio:latest
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      GRADIO_MODEL_ALIAS:     Production
      GRADIO_DATA_PATH:       /app/data/preprocessed
      GRADIO_PORT:            "7860"
      # Cockpit onglets
      PREFECT_API_URL:        http://prefect-server:4200/api
      VPS_IP:                 ${VPS_IP:-51.159.187.132}
      VPS_TAILSCALE_IP:       ${VPS_TAILSCALE_IP:-}
      PUBLIC_URL:             "https://mlops.jakat-inc.fr"
      GITHUB_REPO:            ${GITHUB_REPO:-jakatt/cac_mlops}
      REPORTS_PATH:           /app/reports/drift
      KAPSULE_STATE:          /app/state/kapsule_ips
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:7860:7860"  # UI → http://[tailscale-ip]:7860
    volumes:
      - ./services/gradio/app.py:/app/services/gradio/app.py:ro          # cockpit (override image baked-in)
      - ./services/gradio/scenarios.py:/app/services/gradio/scenarios.py:ro  # scénarios what-if (override)
      - ./data:/app/data:ro        # données préprocessées (read-only)
      - ./reports:/app/reports:ro  # rapports Evidently (read-only)
      - ./state:/app/state:ro      # IPs Kapsule dynamiques (read-only)

  # ── Gradio public — cockpit 3 onglets (Predict + What-If + Points Noirs) accès internet
  gradio-public:
    image: ghcr.io/jakatt/cac-mlops-gradio:latest
    restart: unless-stopped
    command: python /app/services/gradio/app_public.py
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      GRADIO_MODEL_ALIAS:     Production
      GRADIO_DATA_PATH:       /app/data/preprocessed
      GRADIO_PORT:            "7862"
      GRADIO_PUBLIC_URL:      "https://mlops.jakat-inc.fr"
    volumes:
      - ./services/gradio/app_public.py:/app/services/gradio/app_public.py:ro
      - ./services/gradio/scenarios.py:/app/services/gradio/scenarios.py:ro
      - ./data:/app/data:ro
    # Pas de port hôte — nginx le joindra via le réseau Docker (gradio-public:7862)

  # ── node-exporter — métriques système (RAM / CPU / disk) ───────────────────
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "127.0.0.1:9100:9100"

  # ── nginx-prometheus-exporter — métriques NGINX (connexions, requêtes) ──────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:80/stub_status'
    ports:
      - "127.0.0.1:9113:9113"
    depends_on:
      - nginx

  # ── Prometheus — métriques [Phase 4] ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - api

  # ── Loki — centralisation des logs (stack PLG) ──────────────────────────────
  loki:
    image: grafana/loki:3.4.3
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Promtail — agent collecte logs Docker → Loki ────────────────────────────
  promtail:
    image: grafana/promtail:3.4.3
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  # ── Grafana — dashboards [Phase 4] ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.4
    restart: unless-stopped
    ports:
      - "${VPS_TAILSCALE_IP:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:           ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:               "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api-performance.json
      GF_SMTP_ENABLED:                      ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST:                         ${GF_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER:                         ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD:                     ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS:                 ${GF_SMTP_FROM_ADDRESS:-grafana@cac-mlops.local}
      GF_ALERT_EMAIL:                       ${GF_ALERT_EMAIL:-}
      GF_ALERTING_ENABLED:                  "false"
      GF_UNIFIED_ALERTING_ENABLED:          "true"
      GF_UNIFIED_ALERTING_STATE_HISTORY_ENABLED:          "true"
      GF_UNIFIED_ALERTING_STATE_HISTORY_BACKEND:          loki
      GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_REMOTE_URL:  http://loki:3100
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:   # named volume — Docker gère les permissions (UID 65534)
  grafana_data:      # named volume — Docker gère les permissions (UID 472)
  prefect_data:      # named volume — SQLite Prefect + config
  loki_data:         # named volume — chunks + index Loki (logs 30 jours)

# MinIO et Postgres utilisent des bind mounts sur /data (block storage Scaleway)
# DOCKER_VOLUMES_PATH=/data dans .env sur le serveur → block storage (19 GB)
# En local, DOCKER_VOLUMES_PATH non défini → ./volumes (ignoré par git)
