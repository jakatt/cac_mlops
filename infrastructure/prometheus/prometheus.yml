global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cac-mlops-api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: nginx-exporter
    static_configs:
      - targets: ['nginx-exporter:9113']
