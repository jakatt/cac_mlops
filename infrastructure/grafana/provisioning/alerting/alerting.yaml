apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: ${GF_ALERT_EMAIL}
          singleEmail: false

policies:
  - orgId: 1
    receiver: email-alerts

groups:
  - orgId: 1
    name: security-monitoring
    folder: Alerts
    interval: 1m
    rules:
      - uid: brute-force-401
        title: "Brute force détecté (401)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="401"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 20 erreurs 401 en 5 minutes — tentative de brute force"
        labels:
          severity: critical

      - uid: ddos-429
        title: "DDoS / rate-limit (429)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="429"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [50]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 50 erreurs 429 en 5 minutes — attaque DDoS ou storm de requêtes"
        labels:
          severity: critical

      - uid: ram-critical
        title: "RAM critique (< 10%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100"
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [10]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "RAM disponible < 10% — risque d'OOM"
        labels:
          severity: critical

      - uid: disk-data-critical
        title: "Disque /data critique (< 15%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(node_filesystem_avail_bytes{mountpoint="/data"} / node_filesystem_size_bytes{mountpoint="/data"}) * 100'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [15]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Disque /data < 15% libre — nettoyage requis"
        labels:
          severity: critical
