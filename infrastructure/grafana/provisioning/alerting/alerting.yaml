apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: ${GF_ALERT_EMAIL}
          singleEmail: false

policies:
  - orgId: 1
    receiver: email-alerts

groups:
  - orgId: 1
    name: security-monitoring
    folder: Alerts
    interval: 1m
    rules:
      - uid: brute-force-401
        title: "Brute force détecté (401)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="401"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 20 erreurs 401 en 5 minutes — tentative de brute force"
        labels:
          severity: critical

      - uid: ddos-429
        title: "DDoS / rate-limit (429)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="429"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [50]
                    type: gt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 50 erreurs 429 en 5 minutes — attaque DDoS ou storm de requêtes"
        labels:
          severity: critical

      - uid: ram-critical
        title: "RAM critique (< 10%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100"
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [10]
                    type: lt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "RAM disponible < 10% — risque d'OOM"
        labels:
          severity: critical

      - uid: disk-data-critical
        title: "Disque /data critique (< 15%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(node_filesystem_avail_bytes{mountpoint="/data"} / node_filesystem_size_bytes{mountpoint="/data"}) * 100'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [15]
                    type: lt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Disque /data < 15% libre — nettoyage requis"
        labels:
          severity: critical

  - orgId: 1
    name: logs-monitoring
    folder: Alerts
    interval: 2m
    rules:
      - uid: prefect-error-logs
        title: "Prefect — erreur de flow (ERROR)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} |~ "ERROR|CRITICAL" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Log ERROR ou CRITICAL dans prefect-worker — vérifier les flow runs dans l'UI Prefect"
        labels:
          severity: critical

      - uid: mlops-alert-critical
        title: "MLOps — alerte critique (event=alert severity=critical)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} | logfmt | event="alert", severity="critical" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Événement MLOps critique (validation ETL, drift, échec de déploiement/Kapsule, disque post-nettoyage…) — voir le champ topic= dans les logs Loki pour le détail"
        labels:
          severity: critical

      - uid: mlops-alert-warning
        title: "MLOps — alerte warning (event=alert severity=warning)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} | logfmt | event="alert", severity="warning" [10m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Événement MLOps à surveiller (aucun champion, drift modéré, ONISR partiel…) — voir le champ topic= dans les logs Loki pour le détail"
        labels:
          severity: warning

      - uid: gate-stop
        title: "Prefect — gate refusée (STOP)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service=~"prefect-worker|gradio"} | logfmt | event="gate_resolved", decision="STOP" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Un déploiement en attente de gate a été refusé (STOP) depuis le Cockpit — rien n'a été appliqué en prod"
        labels:
          severity: info

      - uid: rollback-triggered
        title: "Prefect — rollback déclenché"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} | logfmt | event="rollback" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Rollback automatique déclenché (alias MLflow, image Docker ou Kapsule) — un smoke test/test-api a échoué après application"
        labels:
          severity: warning
