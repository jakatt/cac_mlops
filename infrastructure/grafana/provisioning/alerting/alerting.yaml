apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: ${GF_ALERT_EMAIL}
          singleEmail: false

policies:
  - orgId: 1
    receiver: email-alerts

groups:
  - orgId: 1
    name: security-monitoring
    folder: Alerts
    interval: 1m
    rules:
      - uid: brute-force-401
        title: "Brute force détecté (401)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="401"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 20 erreurs 401 en 5 minutes — tentative de brute force"
        labels:
          severity: critical

      - uid: ddos-429
        title: "DDoS / rate-limit (429)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(api_requests_total{status="429"}[5m])'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [50]
                    type: gt
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Plus de 50 erreurs 429 en 5 minutes — attaque DDoS ou storm de requêtes"
        labels:
          severity: critical

      - uid: ram-critical
        title: "RAM critique (< 10%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100"
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [10]
                    type: lt
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "RAM disponible < 10% — risque d'OOM"
        labels:
          severity: critical

      - uid: disk-data-critical
        title: "Disque /data critique (< 15%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(node_filesystem_avail_bytes{mountpoint="/data"} / node_filesystem_size_bytes{mountpoint="/data"}) * 100'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: "A"
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "B"
              conditions:
                - evaluator:
                    params: [15]
                    type: lt
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Disque /data < 15% libre — nettoyage requis"
        labels:
          severity: critical

  - orgId: 1
    name: logs-monitoring
    folder: Alerts
    interval: 2m
    rules:
      - uid: prefect-error-logs
        title: "Prefect — erreur de flow (ERROR)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} |~ "ERROR|CRITICAL" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "Log ERROR ou CRITICAL dans prefect-worker — vérifier les flow runs dans l'UI Prefect"
        labels:
          severity: critical

      - uid: no-champion-log
        title: "Prefect — aucun algorithme champion (KPI non atteints)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} |= "Aucun algorithme" [10m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "train_flow terminé sans champion — aucun algorithme ne dépasse les seuils KPI, @Production inchangé"
        labels:
          severity: warning

      - uid: drift-critical-log
        title: "Prefect — drift critique détecté"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="prefect-worker"} |= "CRITICAL drift detected" [5m])'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "A"
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "Drift critique détecté par Evidently — action manuelle requise, rapport disponible dans Grafana"
        labels:
          severity: critical
