name: Kapsule — Start (crée node pool + déploie)

on:
  workflow_dispatch:
    inputs:
      node_type:
        description: "Type de nœud Kapsule"
        required: false
        default: "BASIC3-X2C-8G"
      node_count:
        description: "Nombre de nœuds"
        required: false
        default: "2"

jobs:
  kapsule-up:
    runs-on: ubuntu-latest
    env:
      SCW_ACCESS_KEY:    ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY:    ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORG_ID }}
      CLUSTER_ID:        ${{ secrets.KAPSULE_CLUSTER_ID }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. CLI Scaleway ────────────────────────────────────────────────────
      - name: Installer scw CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      # ── 2. Créer le node pool ──────────────────────────────────────────────
      - name: Créer node pool Kapsule
        run: |
          scw k8s pool create \
            cluster-id=$CLUSTER_ID \
            name=main \
            size=${{ inputs.node_count || '2' }} \
            node-type=${{ inputs.node_type || 'GP1-S' }} \
            zone=fr-par-1

      # ── 3. Attendre que les nœuds soient ready ────────────────────────────
      - name: Attendre nœuds ready (max 15 min)
        run: |
          for i in $(seq 1 90); do
            STATUS=$(scw k8s pool list cluster-id=$CLUSTER_ID -o json \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[-1]['status'] if d else 'none')")
            echo "  [$((i*10))s] status=$STATUS"
            if [ "$STATUS" = "ready" ]; then
              echo "✓ Nœuds ready"
              break
            fi
            # warning = nœuds partiellement disponibles — on continue après 5 min
            if [ "$STATUS" = "warning" ] && [ $i -ge 30 ]; then
              echo "⚠️  Pool warning après ${i}×10s — on continue (nœuds partiellement disponibles)"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "✗ Timeout 15 min — status=$STATUS"
              exit 1
            fi
            sleep 10
          done

      # ── 4. Récupérer le kubeconfig ─────────────────────────────────────────
      - name: Récupérer kubeconfig
        run: |
          mkdir -p ~/.kube
          scw k8s kubeconfig get $CLUSTER_ID > ~/.kube/config
          kubectl cluster-info

      # ── 5. Upload du modèle vers Scaleway S3 (depuis le VPS) ──────────────
      - name: Upload modèle → Scaleway S3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          envs:     SCW_ACCESS_KEY,SCW_SECRET_KEY
          script: |
            set -e
            MODEL=/data/cac_mlops/src/models/trained_model.joblib
            if [ ! -f "$MODEL" ]; then
              echo "⚠️  Modèle introuvable sur le VPS : $MODEL"
              exit 1
            fi
            docker run --rm \
              -e AWS_ACCESS_KEY_ID=$SCW_ACCESS_KEY \
              -e AWS_SECRET_ACCESS_KEY=$SCW_SECRET_KEY \
              -e AWS_DEFAULT_REGION=fr-par \
              -v /data/cac_mlops/src/models:/models \
              amazon/aws-cli s3 cp /models/trained_model.joblib \
                s3://cac-mlops-data/k8s-model/trained_model.joblib \
                --endpoint-url https://s3.fr-par.scw.cloud
            echo "✓ Modèle uploadé → s3://cac-mlops-data/k8s-model/trained_model.joblib"

      # ── 6. Créer le namespace + les secrets ───────────────────────────────
      - name: Namespace + Secrets
        run: |
          kubectl create namespace cac-mlops --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic s3-creds \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.SCW_ACCESS_KEY }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.SCW_SECRET_KEY }} \
            -n cac-mlops --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic app-creds \
            --from-literal=JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            --from-literal=API_USERNAME=${{ secrets.API_USERNAME }} \
            --from-literal=API_PASSWORD=${{ secrets.API_PASSWORD }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -n cac-mlops --dry-run=client -o yaml | kubectl apply -f -

      # ── 7. ConfigMaps Grafana (depuis les fichiers du repo) ───────────────
      - name: ConfigMaps Grafana
        run: |
          kubectl create configmap grafana-provisioning-datasources \
            --from-file=infrastructure/grafana/provisioning/datasources/ \
            -n cac-mlops --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap grafana-provisioning-dashboards \
            --from-file=infrastructure/grafana/provisioning/dashboards/ \
            -n cac-mlops --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap grafana-dashboards \
            --from-file=infrastructure/grafana/dashboards/ \
            -n cac-mlops --dry-run=client -o yaml | kubectl apply -f -

      # ── 8. Appliquer tous les manifests ───────────────────────────────────
      - name: kubectl apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          for dir in api mlflow nginx prefect prometheus grafana; do
            kubectl apply -f k8s/$dir/
          done

      # ── 9. Patcher PREFECT_UI_API_URL avec l'IP du LB Prefect ────────────
      - name: Patcher Prefect UI URL
        run: |
          echo "Attente IP LoadBalancer prefect-server (max 3 min)..."
          for i in $(seq 1 18); do
            PREFECT_LB=$(kubectl get svc prefect-server -n cac-mlops \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$PREFECT_LB" ]; then
              echo "✓ Prefect LB IP: $PREFECT_LB"
              kubectl set env deployment/prefect-server \
                -n cac-mlops \
                PREFECT_UI_API_URL=http://$PREFECT_LB:4200/api
              break
            fi
            echo "  [$((i*10))s] en attente..."
            sleep 10
          done

      # ── 10. Attendre que l'API soit ready ─────────────────────────────────
      - name: Attendre API ready
        run: |
          kubectl wait deployment api \
            -n cac-mlops \
            --for=condition=available \
            --timeout=300s

      # ── 11. Résumé ────────────────────────────────────────────────────────
      - name: Résumé du déploiement
        run: |
          echo "=== Pods ==="
          kubectl get pods -n cac-mlops

          echo ""
          echo "=== Services (LoadBalancer IPs) ==="
          kubectl get svc -n cac-mlops

          NGINX_LB=$(kubectl get svc nginx -n cac-mlops \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          GRAFANA_LB=$(kubectl get svc grafana -n cac-mlops \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          PREFECT_LB=$(kubectl get svc prefect-server -n cac-mlops \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")

          echo ""
          echo "=== URLs ==="
          echo "  API      : http://$NGINX_LB/health"
          echo "  API docs : http://$NGINX_LB/docs"
          echo "  Grafana  : http://$GRAFANA_LB:3000  (admin/admin)"
          echo "  Prefect  : http://$PREFECT_LB:4200"
          echo "  MLflow   : kubectl port-forward svc/mlflow 5000:5000 -n cac-mlops"

          echo ""
          echo "=== HPA ==="
          kubectl get hpa -n cac-mlops
