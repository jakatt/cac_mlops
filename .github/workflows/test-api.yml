name: Test — API end-to-end

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test JWT auth + /predict
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            API="http://localhost:8090"
            PAYLOAD='{"place":10,"catu":1,"sexe":1,"secu1":1.0,"year_acc":2023,"victim_age":35.0,"catv":7,"obsm":1,"motor":1,"catr":4,"circ":2.0,"surf":1.0,"situ":1.0,"vma":50.0,"jour":3,"mois":6,"lum":1,"dep":75,"com":75056,"agg_":2,"int":1,"atm":1.0,"col":2.0,"lat":48.8566,"long":2.3522,"hour":14,"nb_victim":1,"nb_vehicules":1}'

            echo "=== 1. Healthcheck ==="
            curl -sf --max-time 10 "$API/health" | python3 -m json.tool

            echo "=== 2. Token JWT ==="
            TOKEN=$(curl -sf --max-time 10 -X POST "$API/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "username=admin&password=changeme" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
            echo "Token obtenu longueur ${#TOKEN}"

            echo "=== 3. /predict sans token (expect 401) ==="
            STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              -X POST "$API/predict" -H "Content-Type: application/json" -d "$PAYLOAD")
            [ "$STATUS" = "401" ] && echo "OK Auth guard 401" || (echo "FAIL expected 401 got $STATUS" && exit 1)

            echo "=== 4. /predict avec token (expect 200) ==="
            HTTP_CODE=$(curl -s --max-time 60 \
              -o /tmp/pred.json -w "%{http_code}" \
              -X POST "$API/predict" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "$PAYLOAD")
            BODY=$(cat /tmp/pred.json 2>/dev/null || echo vide)
            echo "HTTP=$HTTP_CODE Body=$BODY"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "OK prediction reussie"
            else
              echo "FAIL expected 200 got $HTTP_CODE"
              docker compose logs --tail=30 api
              exit 1
            fi

            echo "=== 5. Rate limit (22 requetes, expect 429) ==="
            GOT_429=0
            for i in $(seq 1 22); do
              S=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" \
                -X POST "$API/predict" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d "$PAYLOAD")
              if [ "$S" = "429" ]; then
                GOT_429=1
                echo "OK 429 a la requete $i rate limiting actif"
                break
              fi
            done
            [ "$GOT_429" = "1" ] || echo "WARN pas de 429 burst=5 absorbe"

            echo "=== Phase 3 Tests END-TO-END OK ==="
