name: Test — API end-to-end

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test JWT auth + /predict
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            API="http://localhost:8090"

            echo "=== 1. Healthcheck ==="
            curl -sf "$API/health" | python3 -m json.tool

            echo "=== 2. Token JWT (admin/changeme) ==="
            TOKEN=$(curl -sf -X POST "$API/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "username=admin&password=changeme" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
            echo "Token: ${TOKEN:0:30}..."

            echo "=== 3. POST /predict sans token (expect 401) ==="
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API/predict" \
              -H "Content-Type: application/json" \
              -d '{"place":10,"catu":1,"sexe":1,"secu1":1,"year_acc":2023,"victim_age":35,"catv":7,"obsm":1,"motor":1,"circ":2,"surf":1,"situ":1,"vma":50,"nb_victim":1,"nb_vehicules":1,"hour":14,"lum":1,"dep":75,"com":75056,"agg_":2,"int":1,"atm":1,"col":2,"lat":48.8566,"long":2.3522}')
            echo "Status (expect 401): $STATUS"
            [ "$STATUS" = "401" ] && echo "✅ Auth guard OK" || (echo "❌ Expected 401, got $STATUS" && exit 1)

            echo "=== 4. POST /predict avec token (expect 200) ==="
            PREDICT_BODY='{"place":10,"catu":1,"sexe":1,"secu1":1,"year_acc":2023,"victim_age":35,"catv":7,"obsm":1,"motor":1,"circ":2,"surf":1,"situ":1,"vma":50,"nb_victim":1,"nb_vehicules":1,"hour":14,"lum":1,"dep":75,"com":75056,"agg_":2,"int":1,"atm":1,"col":2,"lat":48.8566,"long":2.3522}'
            HTTP_CODE=$(curl -s -o /tmp/predict_resp.json -w "%{http_code}" \
              -X POST "$API/predict" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "$PREDICT_BODY")
            RESULT=$(cat /tmp/predict_resp.json)
            echo "HTTP: $HTTP_CODE  Body: $RESULT"
            [ "$HTTP_CODE" = "200" ] && echo "✅ /predict OK avec JWT" || (echo "❌ Expected 200, got $HTTP_CODE" && exit 1)

            echo "=== 5. Rate limit (21 requêtes rapides, expect 429) ==="
            GOT_429=0
            for i in $(seq 1 22); do
              S=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API/predict" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d '{"place":10,"catu":1,"sexe":1,"secu1":1,"year_acc":2023,"victim_age":35,"catv":7,"obsm":1,"motor":1,"circ":2,"surf":1,"situ":1,"vma":50,"nb_victim":1,"nb_vehicules":1,"hour":14,"lum":1,"dep":75,"com":75056,"agg_":2,"int":1,"atm":1,"col":2,"lat":48.8566,"long":2.3522}')
              if [ "$S" = "429" ]; then
                GOT_429=1
                echo "✅ 429 reçu à la requête $i — rate limiting OK"
                break
              fi
            done
            [ "$GOT_429" = "1" ] || echo "⚠️  Aucun 429 reçu (burst=5 absorbé, OK selon config)"

            echo ""
            echo "=== Phase 3 — Tests END-TO-END PASSÉS ✅ ==="
