name: Ops — Migrer projet vers /data (block storage)

# Deplace uniquement le repertoire du projet du NVMe vers le block storage.
# Impact : AUCUN sur les autres applis du VPS (pas de restart Docker).
#
# Resultat :
#   /data/cac_mlops/           ← code + data/raw + data/preprocessed
#   /data/cac_mlops/.dvc/cache ← cache DVC (automatiquement sur /data)
#   /var/lib/docker/           ← inchange (Docker reste sur NVMe)
#
# NVMe apres migration : OS + Docker uniquement (~7-10 GB sur 17 GB = OK)
# /data apres migration : projet + volumes MinIO/PostgreSQL (74 GB)
#
# APRES CE WORKFLOW :
#   1. Aller dans GitHub Settings -> Secrets -> DEPLOY_DIR
#   2. Changer la valeur pour : /data/cac_mlops
#   3. Lancer un deploy pour verifier

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Migration projet vers /data (sans toucher Docker ni les autres applis)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -e

            OLD_DIR="${{ secrets.DEPLOY_DIR }}"
            NEW_DIR="/data/cac_mlops"

            echo "==> Etat AVANT migration"
            df -h
            echo ""
            echo "  Projet actuel : $OLD_DIR"
            du -sh "$OLD_DIR" 2>/dev/null || true

            # ── 1. COPIE DU PROJET ────────────────────────────────────────────
            echo ""
            echo "==> Copie projet : $OLD_DIR -> $NEW_DIR"

            if [ -d "$NEW_DIR" ] && [ ! -L "$NEW_DIR" ]; then
              echo "  $NEW_DIR existe deja, verification des droits"
              sudo chown -R deploy:deploy "$NEW_DIR"
            else
              sudo cp -a "$OLD_DIR" "$NEW_DIR"
              sudo chown -R deploy:deploy "$NEW_DIR"
              echo "  Copie terminee"
            fi

            echo "  Taille copiee : $(du -sh $NEW_DIR | cut -f1)"

            # ── 2. SYMLINK DE COMPATIBILITE ───────────────────────────────────
            # Permet aux workflows qui utilisent encore l'ancien DEPLOY_DIR de fonctionner
            # en attendant la mise a jour du secret GitHub
            if [ ! -L "$OLD_DIR" ] && [ -d "$OLD_DIR" ]; then
              sudo mv "$OLD_DIR" "${OLD_DIR}.bak"
              sudo ln -s "$NEW_DIR" "$OLD_DIR"
              echo "  Symlink cree : $OLD_DIR -> $NEW_DIR"
              echo "  (ancienne copie sauvegardee dans ${OLD_DIR}.bak)"
            fi

            # ── 3. NETTOYAGE DE L'ANCIENNE SAUVEGARDE ─────────────────────────
            # Supprimer le backup en arriere-plan pour ne pas bloquer
            if [ -d "${OLD_DIR}.bak" ]; then
              nohup sudo rm -rf "${OLD_DIR}.bak" > /dev/null 2>&1 &
              echo "  Suppression ancienne copie en cours (background)"
            fi

            # ── 4. VERIFICATION ───────────────────────────────────────────────
            echo ""
            echo "==> Verification"
            if [ -f "$NEW_DIR/docker-compose.yml" ] || [ -f "$NEW_DIR/docker-compose.yaml" ]; then
              echo "  docker-compose.yml trouve dans $NEW_DIR"
            else
              echo "ERREUR : docker-compose.yml introuvable dans $NEW_DIR"
              exit 1
            fi

            # Verifier que les services tournent toujours (pas touches)
            echo "  Services Docker (inchanges) :"
            docker ps --format "  {{.Names}} : {{.Status}}" | grep -v "^$" | head -10

            echo ""
            echo "==> Etat APRES migration"
            df -h
            echo ""
            echo "================================================"
            echo "  MIGRATION TERMINEE"
            echo ""
            echo "  Projet maintenant dans : $NEW_DIR"
            echo "  Symlink : $OLD_DIR -> $NEW_DIR"
            echo ""
            echo "  ACTION REQUISE :"
            echo "  GitHub -> Settings -> Secrets -> DEPLOY_DIR"
            echo "  Nouvelle valeur : /data/cac_mlops"
            echo ""
            echo "  Puis lancer le workflow Deploy pour verifier."
            echo "================================================"
