name: Deploy — main → Scaleway

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy sur le serveur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key: ${{ secrets.SCALEWAY_SSH_KEY }}
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            echo "==> Pull du code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Pull des données DVC"
            dvc pull --run-cache || true

            echo "==> Rebuild et redémarrage des services"
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "==> Healthcheck (attente max 90s)"
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "API OK après $((i*5))s"
                break
              fi
              if [ $i -eq 18 ]; then
                echo "Timeout — logs API :"
                docker compose logs --tail=50 api
                exit 1
              fi
              echo "  attente... ($((i*5))s)"
              sleep 5
            done

            echo "==> Deploy OK"
