name: Deploy — main → Scaleway

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA tag override (laisser vide pour auto)"
        required: false
        default: ""

concurrency:
  group: deploy-scaleway
  cancel-in-progress: true   # garde uniquement le deploy du dernier commit

permissions:
  contents: read
  packages: write   # push vers ghcr.io

jobs:

  # ── Job 0 : détecter si les images Docker doivent être rebuildées ──────────
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Vérifier si Dockerfiles / requirements ont changé
        id: check
        run: |
          # workflow_dispatch force toujours le build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Build forcé (workflow_dispatch)"
            exit 0
          fi
          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
            | grep -cE '^(services/.+/Dockerfile|services/gradio/.*\.py|services/api/app/.*\.py|requirements.*\.txt|pyproject\.toml|setup\.cfg)' || true)
          if [ "${CHANGED:-0}" -gt 0 ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Code service ou Dockerfile modifié → build complet"
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "Pas de changement image → skip build"
          fi

  # ── Job 1 : build et push des images (seulement si Dockerfile a changé) ───
  build:
    needs: check-changes
    if: needs.check-changes.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        run: echo "SHA_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build + push MLflow image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:${{ env.SHA_TAG }} \
            -f services/mlflow/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:${{ env.SHA_TAG }}

      - name: Build + push API image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-api:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-api:${{ env.SHA_TAG }} \
            -f services/api/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-api:${{ env.SHA_TAG }}

      - name: Build + push Gradio image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:${{ env.SHA_TAG }} \
            -f services/gradio/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:${{ env.SHA_TAG }}

      - name: Scan vulnérabilités Trivy (CRITICAL — images API + Gradio)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          TRIVY_FAILED=false
          for image in cac-mlops-api cac-mlops-gradio cac-mlops-mlflow; do
            echo "==> Trivy scan : ghcr.io/${{ github.repository_owner }}/$image:latest"
            trivy image \
              --exit-code 1 \
              --severity CRITICAL \
              --ignore-unfixed \
              --ignorefile .trivyignore \
              --no-progress \
              ghcr.io/${{ github.repository_owner }}/$image:latest \
            || TRIVY_FAILED=true
          done
          if [ "$TRIVY_FAILED" = "true" ]; then
            echo "::error::CVE CRITICAL détectée — deploy bloqué"
            exit 1
          fi

  # ── Job 2 : git pull + docker compose up + smoke test + Prefect (SSH) ──────
  trigger-deploy:
    needs: [check-changes, build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy sur VPS (pull + up + smoke + Prefect gate)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            SHA_TAG="${{ github.sha }}"
            SHA_SHORT="${SHA_TAG::8}"
            NEEDS_BUILD="${{ needs.check-changes.outputs.needs_build }}"

            cd "$DEPLOY_DIR"

            # Pull code — stash les éventuels fichiers SCP'd locaux avant merge
            git stash --include-untracked || true
            git pull origin main

            if [ "$NEEDS_BUILD" = "true" ]; then
              # Login GHCR depuis le .env du VPS
              GHCR_TOKEN=$(grep '^GHCR_TOKEN=' .env | cut -d= -f2- || true)
              GHCR_USER=$(grep '^GHCR_USER=' .env | cut -d= -f2- || echo "jakatt")
              if [ -n "$GHCR_TOKEN" ]; then
                echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
              fi

              # Tag images actuelles comme rollback avant tout changement
              for img in cac-mlops-api cac-mlops-mlflow cac-mlops-gradio; do
                docker tag "ghcr.io/jakatt/$img:latest" "ghcr.io/jakatt/$img:rollback" 2>/dev/null || true
              done

              echo "==> Build détecté — pull nouvelles images GHCR"
              docker compose pull
            else
              echo "==> Pas de build — images existantes conservées"
            fi

            docker compose up -d --remove-orphans
            # Force nginx à re-résoudre le DNS après recréation des conteneurs
            docker compose restart nginx

            # Re-synchroniser les schémas de deployments Prefect (paramètres, entrypoints)
            docker compose exec -T prefect-worker prefect deploy --all \
              && echo "prefect deploy --all ✓" \
              || echo "::warning::prefect deploy --all échoué — schémas potentiellement périmés"

            # Smoke test (120s max — API charge le modèle MLflow au démarrage)
            HEALTHY=false
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8090/health >/dev/null 2>&1; then
                HEALTHY=true
                echo "  Stack healthy après $((i * 5))s"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "::error::Smoke test échoué après 120s — stack non opérationnelle"
              if [ "$NEEDS_BUILD" = "true" ]; then
                echo "Rollback images :rollback"
                for img in cac-mlops-api cac-mlops-mlflow cac-mlops-gradio; do
                  docker tag "ghcr.io/jakatt/$img:rollback" "ghcr.io/jakatt/$img:latest" 2>/dev/null || true
                done
                docker compose up -d
              fi
              exit 1
            fi

            # Détecter si les fichiers blueprint/modèle ont changé (trigger 3)
            BLUEPRINT_CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null \
              | grep -cE '^(src/models/|src/features/|config/model_params\.yml)' || true)

            if [ "${BLUEPRINT_CHANGED:-0}" -gt 0 ]; then
              echo "==> Blueprint DS modifié — déclenchement update-model-flow"
              docker compose exec -T prefect-worker \
                prefect deployment run 'update-model-flow/update-model' \
                  --param "sha_tag=${SHA_SHORT}" \
              && echo "update-model-flow déclenché ✓" \
              || echo "::warning::update-model-flow non déclenché — relancer depuis Prefect UI"
            else
              echo "==> Déploiement code seul (SHA: ${SHA_SHORT})"
              docker compose exec -T prefect-worker \
                prefect deployment run \
                  'deploy-vps-flow/deploy-vps' \
                  --param "sha_tag=${SHA_SHORT}" \
              && echo "deploy-vps-flow déclenché ✓" \
              || echo "::warning::Échec du déclenchement Prefect — relancer manuellement depuis l'UI"
            fi
