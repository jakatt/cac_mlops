name: Deploy — main → Scaleway

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      sha_tag:
        description: "SHA tag override (laisser vide pour auto)"
        required: false
        default: ""

concurrency:
  group: deploy-scaleway
  cancel-in-progress: true   # garde uniquement le deploy du dernier commit

permissions:
  contents: write  # push vers ghcr.io + tag mobile last-image-build
  packages: write   # push vers ghcr.io

jobs:

  # ── Job 0 : détecter si les images Docker doivent être rebuildées ──────────
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_build:  ${{ steps.check.outputs.needs_build }}
      build_mlflow: ${{ steps.check.outputs.build_mlflow }}
      build_api:    ${{ steps.check.outputs.build_api }}
      build_gradio: ${{ steps.check.outputs.build_gradio }}
      build_caddy:  ${{ steps.check.outputs.build_caddy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # historique complet — nécessaire pour differ contre un tag ancien

      - name: Vérifier si Dockerfiles / requirements ont changé (par image)
        id: check
        run: |
          # workflow_dispatch force toujours le build des 3 images
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_mlflow=true" >> $GITHUB_OUTPUT
            echo "build_api=true"    >> $GITHUB_OUTPUT
            echo "build_gradio=true" >> $GITHUB_OUTPUT
            echo "build_caddy=true"  >> $GITHUB_OUTPUT
            echo "needs_build=true"  >> $GITHUB_OUTPUT
            echo "Build forcé — 4 images (workflow_dispatch)"
            exit 0
          fi

          # Compare au dernier commit pour lequel un build a RÉELLEMENT réussi
          # (tag mobile last-image-build), pas seulement au commit précédent.
          # Évite de manquer un rebuild si un push précédent a été annulé par
          # `concurrency: cancel-in-progress` avant la fin de son propre build.
          git fetch origin 'refs/tags/last-image-build:refs/tags/last-image-build' 2>/dev/null || true
          if git rev-parse -q --verify refs/tags/last-image-build >/dev/null; then
            BASE_REF="last-image-build"
          else
            BASE_REF="HEAD~1"
            echo "Tag last-image-build introuvable — comparaison à HEAD~1 (premier run)"
          fi

          CHANGED_FILES=$(git diff "$BASE_REF" --name-only 2>/dev/null || true)

          # Un flag par image plutôt qu'un seul booléen global — évite de
          # rebuilder les 3 images (~4 min chacune) quand une seule a changé.
          # Chaque regex reflète les COPY du Dockerfile correspondant (une image
          # baked doit être fraîche pour Kapsule/K8s, qui n'a pas les bind-mounts
          # VPS — cf. services/*/Dockerfile).
          BUILD_MLFLOW=false
          BUILD_API=false
          BUILD_GRADIO=false
          BUILD_CADDY=false

          echo "$CHANGED_FILES" | grep -qE '^services/mlflow/Dockerfile$' && BUILD_MLFLOW=true

          echo "$CHANGED_FILES" | grep -qE '^(services/api/Dockerfile|services/api/requirements.*\.txt|services/api/app/.*|services/monitoring/.*|services/__init__\.py|src/.*|scripts/.*|config/.*|prefect\.yaml|\.dvc/config|requirements.*\.txt|pyproject\.toml|setup\.cfg)$' && BUILD_API=true

          echo "$CHANGED_FILES" | grep -qE '^(services/gradio/Dockerfile|services/gradio/requirements.*\.txt|services/gradio/.*\.py|src/.*)$' && BUILD_GRADIO=true

          # Caddy custom (plugin de stockage S3) : K8s uniquement, jamais utilisé
          # par le VPS (Caddy y est un service systemd host-level, hors Docker).
          echo "$CHANGED_FILES" | grep -qE '^services/caddy/Dockerfile$' && BUILD_CADDY=true

          echo "build_mlflow=$BUILD_MLFLOW" >> $GITHUB_OUTPUT
          echo "build_api=$BUILD_API"       >> $GITHUB_OUTPUT
          echo "build_gradio=$BUILD_GRADIO" >> $GITHUB_OUTPUT
          echo "build_caddy=$BUILD_CADDY"   >> $GITHUB_OUTPUT

          if [ "$BUILD_MLFLOW" = "true" ] || [ "$BUILD_API" = "true" ] || [ "$BUILD_GRADIO" = "true" ] || [ "$BUILD_CADDY" = "true" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi
          echo "Depuis $BASE_REF → mlflow=$BUILD_MLFLOW api=$BUILD_API gradio=$BUILD_GRADIO caddy=$BUILD_CADDY"

  # ── Job 1 : build et push des images (seulement si Dockerfile a changé) ───
  build:
    needs: check-changes
    if: needs.check-changes.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        run: echo "SHA_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build + push MLflow image
        if: needs.check-changes.outputs.build_mlflow == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:${{ env.SHA_TAG }} \
            -f services/mlflow/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-mlflow:${{ env.SHA_TAG }}

      - name: Build + push API image
        if: needs.check-changes.outputs.build_api == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-api:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-api:${{ env.SHA_TAG }} \
            -f services/api/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-api:${{ env.SHA_TAG }}

      - name: Build + push Gradio image
        if: needs.check-changes.outputs.build_gradio == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:${{ env.SHA_TAG }} \
            -f services/gradio/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-gradio:${{ env.SHA_TAG }}

      - name: Build + push Caddy image (K8s uniquement — plugin stockage S3)
        if: needs.check-changes.outputs.build_caddy == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-caddy:latest \
            -t ghcr.io/${{ github.repository_owner }}/cac-mlops-caddy:${{ env.SHA_TAG }} \
            -f services/caddy/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-caddy:latest
          docker push ghcr.io/${{ github.repository_owner }}/cac-mlops-caddy:${{ env.SHA_TAG }}

      - name: Scan vulnérabilités Trivy (CRITICAL — images API + Gradio + MLflow + Caddy)
        # Scanne toujours les 4, même si une seule a été rebuildée ce run :
        # trivy pull l'image depuis ghcr.io (le tag :latest existe toujours,
        # rebuildé ou non) — coût faible, et ça détecte aussi une CVE tout
        # juste publiée sur une image qu'on n'a pas retouchée aujourd'hui.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          TRIVY_FAILED=false
          for image in cac-mlops-api cac-mlops-gradio cac-mlops-mlflow cac-mlops-caddy; do
            echo "==> Trivy scan : ghcr.io/${{ github.repository_owner }}/$image:latest"
            trivy image \
              --exit-code 1 \
              --severity CRITICAL \
              --ignore-unfixed \
              --ignorefile .trivyignore \
              --no-progress \
              ghcr.io/${{ github.repository_owner }}/$image:latest \
            || TRIVY_FAILED=true
          done
          if [ "$TRIVY_FAILED" = "true" ]; then
            echo "::error::CVE CRITICAL détectée — deploy bloqué"
            exit 1
          fi

      - name: Marquer ce commit comme dernier build réussi
        run: |
          # Déplace le tag mobile sur ce commit — sert de référence à check-changes
          # pour savoir depuis quand comparer, au lieu de HEAD~1 uniquement.
          git tag -f last-image-build
          git push origin last-image-build --force

  # ── Job 2 : git pull + pull images + déclenchement Prefect (SSH) ───────────
  # docker compose up / restarts / smoke test sont exécutés par le flow Prefect
  # après la gate manuelle (voir deploy_vps_flow.py) — ce job ne fait que préparer.
  trigger-deploy:
    needs: [check-changes, build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy sur VPS (pull + trigger Prefect)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            SHA_TAG="${{ github.sha }}"
            SHA_SHORT="${SHA_TAG::8}"
            NEEDS_BUILD="${{ needs.check-changes.outputs.needs_build }}"

            cd "$DEPLOY_DIR"

            # Pull code — stash les éventuels fichiers SCP'd locaux avant merge
            git stash --include-untracked || true
            git pull origin main

            if [ "$NEEDS_BUILD" = "true" ]; then
              # Login GHCR depuis le .env du VPS
              GHCR_TOKEN=$(grep '^GHCR_TOKEN=' .env | cut -d= -f2- || true)
              GHCR_USER=$(grep '^GHCR_USER=' .env | cut -d= -f2- || echo "jakatt")
              if [ -n "$GHCR_TOKEN" ]; then
                echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
              fi

              # Tag images actuelles comme rollback avant tout changement
              for img in cac-mlops-api cac-mlops-mlflow cac-mlops-gradio; do
                docker tag "ghcr.io/jakatt/$img:latest" "ghcr.io/jakatt/$img:rollback" 2>/dev/null || true
              done

              echo "==> Build détecté — pull nouvelles images GHCR"
              docker compose pull
            else
              echo "==> Pas de build — images existantes conservées"
            fi

            # Pas de docker compose up / restart ici : appliqué par deploy-vps-flow /
            # update-model-flow APRÈS la gate manuelle, pour que la gate protège bien
            # toute interruption de service (voir compose_up_task dans deploy_vps_flow.py).
            # Cette étape ne fait que préparer (images pull-ées ci-dessus) et calculer
            # les flags transmis en paramètres au flow Prefect.

            # ── Calcul des redémarrages ciblés selon fichiers modifiés (fast lane) ────
            CHANGED_FILES=$(git diff HEAD~1 --name-only 2>/dev/null || true)

            RESTART_SERVICES=""
            echo "$CHANGED_FILES" | grep -qE '^services/nginx/nginx\.conf$'                    && RESTART_SERVICES="${RESTART_SERVICES}nginx,"
            # docs/ est servi en bind-mount statique par nginx (/ci-docs/) : un
            # ajout/renommage/suppression de fichier peut figer le montage sur
            # une vue périmée (vécu en prod : 404 après un git mv) — restart préventif.
            echo "$CHANGED_FILES" | grep -qE '^docs/'                                          && RESTART_SERVICES="${RESTART_SERVICES}nginx,"
            echo "$CHANGED_FILES" | grep -qE '^services/gradio/(app\.py|scenarios\.py)$'        && RESTART_SERVICES="${RESTART_SERVICES}gradio,"
            echo "$CHANGED_FILES" | grep -qE '^services/gradio/(app_public\.py|scenarios\.py)$' && RESTART_SERVICES="${RESTART_SERVICES}gradio-public,"
            echo "$CHANGED_FILES" | grep -qE '^infrastructure/grafana/provisioning/'            && RESTART_SERVICES="${RESTART_SERVICES}grafana,"
            echo "$CHANGED_FILES" | grep -qE '^infrastructure/prometheus/prometheus\.yml$'      && RESTART_SERVICES="${RESTART_SERVICES}prometheus,"
            echo "$CHANGED_FILES" | grep -qE '^infrastructure/loki/loki-config\.yml$'           && RESTART_SERVICES="${RESTART_SERVICES}loki,"
            echo "$CHANGED_FILES" | grep -qE '^infrastructure/promtail/promtail-config\.yml$'   && RESTART_SERVICES="${RESTART_SERVICES}promtail,"
            # Pas de règle pour prefect-worker : ce service exécute lui-même
            # compose_up_task (deploy_vps_flow.py) après la gate. Se
            # redémarrer soi-même tue le processus qui l'exécute avant qu'il
            # ait pu continuer (test-api, Kapsule, alerte finale) — le run
            # reste orphelin en RUNNING. Inutile de toute façon : le work
            # pool "process" lance chaque flow run dans un sous-processus
            # neuf, donc le code bind-monté (services/, src/) est déjà
            # rechargé sans restart sur le prochain déclenchement.
            RESTART_SERVICES="${RESTART_SERVICES%,}"
            echo "==> Services à redémarrer après la gate : ${RESTART_SERVICES:-aucun}"

            # Re-synchroniser les schémas de deployments Prefect (paramètres, entrypoints)
            # Doit tourner avant le trigger pour que Prefect connaisse needs_build/restart_services
            docker compose exec -T prefect-worker prefect deploy --all \
              && echo "prefect deploy --all ✓" \
              || echo "::warning::prefect deploy --all échoué — schémas potentiellement périmés"

            # Détecter si le blueprint DS a changé (trigger 3) — uniquement
            # config/model_params.yml, le seul artefact qui représente une
            # vraie décision DS (hyperparamètres rf/xgboost/lgbm). src/models/
            # et src/features/ sont du CODE : un changement technique (fix,
            # logging, refactor) n'est pas un nouveau blueprint à valider —
            # confondre les deux déclenche un benchmark complet + comparaison
            # stricte à @Production pour rien (vécu : fix de logging touchant
            # src/models/train_model.py → update-model-flow déclenché à tort,
            # échoué proprement mais sans raison de tourner).
            BLUEPRINT_CHANGED=$(echo "$CHANGED_FILES" | grep -cE '^config/model_params\.yml$' || true)

            # --param value est JSON-parsé par le CLI Prefect avant d'être validé
            # contre le schéma du flow (sha_tag: str) : un SHA dont les 8 premiers
            # caractères hex sont tous des chiffres (ex: 11644311) est un JSON
            # valide → envoyé comme int, rejeté par le schéma "not of type 'string'".
            # D'où les guillemets littéraux dans la valeur, qui forcent un JSON
            # string (incident vécu : PR119, aucun flow run créé, gate jamais
            # apparue dans le Cockpit).
            if [ "${BLUEPRINT_CHANGED:-0}" -gt 0 ]; then
              echo "==> Blueprint DS modifié — déclenchement update-model-flow"
              docker compose exec -T prefect-worker \
                prefect deployment run 'update-model-flow/update-model' \
                  --param "sha_tag=\"${SHA_SHORT}\"" \
                  --param "needs_build=${NEEDS_BUILD}" \
                  --param "restart_services=${RESTART_SERVICES}" \
              && echo "update-model-flow déclenché ✓" \
              || echo "::warning::update-model-flow non déclenché — relancer depuis Prefect UI"
            else
              echo "==> Déploiement code seul (SHA: ${SHA_SHORT})"
              docker compose exec -T prefect-worker \
                prefect deployment run \
                  'deploy-vps-flow/deploy-vps' \
                  --param "sha_tag=\"${SHA_SHORT}\"" \
                  --param "needs_build=${NEEDS_BUILD}" \
                  --param "restart_services=${RESTART_SERVICES}" \
              && echo "deploy-vps-flow déclenché ✓" \
              || echo "::warning::Échec du déclenchement Prefect — relancer manuellement depuis l'UI"
            fi
