name: CI — lint + tests

on:
  push:
    branches: ["jacques", "noel"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]>=3.0"
          pip install -e .

      - name: Lint — erreurs bloquantes
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — avertissements
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Audit sécurité dépendances (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42974 \
            || echo "::warning::Des vulnérabilités ont été détectées — voir rapport pip-audit ci-dessus"

      - name: Tests unitaires
        run: pytest tests/unit/ -v --tb=short
