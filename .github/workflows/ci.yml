name: CI — lint + tests

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Blueprint isolation check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff origin/main HEAD --name-only 2>/dev/null || true)
          else
            CHANGED=$(git diff HEAD~1 HEAD --name-only 2>/dev/null || true)
          fi

          BLUEPRINT=$(echo "$CHANGED" | grep -c '^config/model_params\.yml$' || true)
          CODE=$(echo "$CHANGED" | grep -cE \
            '^(services/api/Dockerfile|services/api/requirements.*\.txt|services/api/app/.*|services/monitoring/.*|services/__init__\.py|src/.*|scripts/.*|prefect\.yaml|requirements.*\.txt|pyproject\.toml|setup\.cfg)$' \
            || true)

          if [ "${BLUEPRINT:-0}" -gt 0 ] && [ "${CODE:-0}" -gt 0 ]; then
            echo "::error::Blueprint (config/model_params.yml) modifié avec du code source dans la même PR."
            echo "::error::Séparer en 2 PRs — PR1 : code seul (T2) · PR2 : config/model_params.yml seul (T3)"
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]>=3.0"
          pip install -e .

      - name: Lint — erreurs bloquantes
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — avertissements
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Audit sécurité dépendances (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42974 \
            || echo "::warning::Des vulnérabilités ont été détectées — voir rapport pip-audit ci-dessus"

      - name: Tests unitaires
        run: pytest tests/unit/ -v --tb=short
