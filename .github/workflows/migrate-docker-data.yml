name: Ops — Migrer Docker vers /data (OPTIONNEL, downtime ~5 min)

# Deplace /var/lib/docker (NVMe) vers /data/docker (block storage).
# PREREQUIS : migrate-project.yml doit avoir ete execute en premier.
#
# !! ATTENTION : ce workflow arrete le daemon Docker sur le VPS !!
# !! TOUTES les applis tournant sous Docker seront coupees ~5 min !!
# !! Planifier en dehors des heures d'utilisation. !!
#
# Ce workflow est OPTIONNEL : le workflow migrate-project.yml seul
# suffit a resoudre les problemes de disque (DVC sur /data).
# Ce workflow libere en plus les ~3-5 GB d'images Docker du NVMe.
#
# Apres ce workflow, mettre a jour infrastructure/docker/daemon.json
# pour que les deploiements futurs preservent la config data-root.

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Migration Docker data-root vers /data (toutes applis coupees ~5 min)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e

            echo "==> Etat AVANT migration"
            df -h /
            df -h /data
            echo ""
            echo "  Docker actuel :"
            docker system df

            echo ""
            echo "==> Arret de tous les conteneurs (cac_mlops + autres applis)"
            # On arrete tout Docker — impact sur Caddy, Qdrant, et autres
            docker ps -q | xargs -r docker stop 2>/dev/null || true

            echo "==> Arret du daemon Docker"
            sudo systemctl stop docker

            if [ -d "/data/docker" ] && [ "$(ls -A /data/docker 2>/dev/null)" ]; then
              echo "  /data/docker deja peuple, skip copie"
            else
              echo "==> Copie /var/lib/docker -> /data/docker"
              sudo mkdir -p /data/docker
              sudo rsync -aH /var/lib/docker/ /data/docker/
              echo "  Copie terminee"
            fi

            echo "==> Configuration daemon.json (data-root + log rotation)"
            sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
            {
              "data-root": "/data/docker",
              "log-driver": "json-file",
              "log-opts": {
                "max-size": "20m",
                "max-file": "3"
              }
            }
            EOF

            echo "==> Demarrage Docker avec nouvelle config"
            sudo systemctl start docker
            sleep 5

            DOCKER_ROOT=$(docker info 2>/dev/null | grep "Docker Root Dir" | awk '{print $NF}')
            echo "  Docker root : $DOCKER_ROOT"
            if [ "$DOCKER_ROOT" != "/data/docker" ]; then
              echo "ERREUR : Docker root n'est pas /data/docker"
              exit 1
            fi

            # Suppression de l'ancien repertoire (libere le NVMe)
            if [ -d "/var/lib/docker" ] && [ ! -L "/var/lib/docker" ]; then
              sudo mv /var/lib/docker /var/lib/docker.old
              sudo ln -s /data/docker /var/lib/docker
              nohup sudo rm -rf /var/lib/docker.old > /dev/null 2>&1 &
              echo "  Suppression ancienne copie en cours (background)"
            fi

            echo "==> Redemarrage des services cac_mlops"
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose up -d

            echo ""
            echo "==> IMPORTANT : les autres applis Docker (Caddy, Qdrant, etc.)"
            echo "  doivent etre redemarrees manuellement si elles ne sont pas"
            echo "  configurees pour redemarrer automatiquement (restart: always)."
            echo "  Verifier : docker ps -a | grep -v cac_mlops"

            echo ""
            echo "==> Etat APRES migration"
            df -h /
            df -h /data
            echo ""
            echo "  Docker root : $(docker info | grep 'Docker Root Dir')"
            docker system df

            echo ""
            echo "================================================"
            echo "  MIGRATION DOCKER TERMINEE"
            echo ""
            echo "  ACTION SUIVANTE REQUISE (pour survie aux deploys futurs) :"
            echo "  Mettre a jour infrastructure/docker/daemon.json dans git"
            echo "  pour inclure data-root = /data/docker"
            echo "  Sinon le prochain Deploy va ecraser la config !"
            echo "================================================"
