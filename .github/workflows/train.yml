name: Train — pipeline on Scaleway

on:
  # Retrain annuel : lundi 02h00 UTC (déclenché manuellement selon cycle ONISR)
  schedule:
    - cron: '0 2 * * 1'

  workflow_dispatch:
    inputs:
      year:
        description: "Année cible d'entraînement (ex: 2022 pour modèle 2021+2022)"
        required: true
        default: "2022"
      cumul:
        description: "Cumul depuis 2021 ? (true/false)"
        required: true
        default: "true"
      algorithm:
        description: "Algorithme : rf | xgboost | lgbm"
        required: false
        default: "rf"
      promote:
        description: "Promouvoir @Production si KPIs OK ? (true/false)"
        required: true
        default: "true"
      simulate_year:
        description: "Année à rejouer via /predict pour drift (ex: 2023 quand year=2022). Vide = year+1"
        required: false
        default: ""

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Run pipeline sur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            YEAR="${{ github.event.inputs.year || '2022' }}"
            CUMUL="${{ github.event.inputs.cumul || 'true' }}"
            ALGO="${{ github.event.inputs.algorithm || 'rf' }}"
            PROMOTE="${{ github.event.inputs.promote || 'true' }}"
            SIM_YEAR="${{ github.event.inputs.simulate_year }}"
            if [ -z "$SIM_YEAR" ]; then
              SIM_YEAR=$((YEAR + 1))
            fi

            echo "==> Paramètres : year=$YEAR cumul=$CUMUL algo=$ALGO promote=$PROMOTE simulate_year=$SIM_YEAR"

            # ── 0. Nettoyage MLflow (libère espace MinIO avant entraînement) ─────
            echo "==> Nettoyage anciens runs MLflow (conservation des 3 derniers)"
            docker compose exec -T api python3 /app/src/scripts/mlflow_cleanup.py

            echo "==> GC artifacts MinIO (suppression physique des runs effacés)"
            docker compose run --rm mlflow mlflow gc \
              --backend-store-uri "postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}" \
              --experiment-ids 1 || true

            echo "==> Espace disque après nettoyage"
            df -h /

            # ── 1. Pull données DVC (entraînement) ───────────────────────────────
            echo "==> Pull données DVC (années 2021 → $YEAR)"
            for y in 2021 2022 2023; do
              if [ "$y" -le "$YEAR" ]; then
                dvc pull data/raw/$y
              fi
            done

            # ── 2. Preprocessing ─────────────────────────────────────────────────
            echo "==> Preprocessing (dans le conteneur api)"
            if [ "$CUMUL" = "true" ]; then
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.make_dataset --year $YEAR --cumul
            else
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.make_dataset --year $YEAR
            fi

            # ── 3. Entraînement ──────────────────────────────────────────────────
            echo "==> Libération NVMe avant entraînement (conteneurs arrêtés + images dangling)"
            docker container prune -f
            docker image prune -f
            echo "==> Espace NVMe disponible"
            df -h /

            echo "==> Entraînement (dans le conteneur api)"
            TRAIN_LOG=$(mktemp)
            if [ "$CUMUL" = "true" ]; then
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.models.train_model --year $YEAR --cumul --algorithm $ALGO 2>&1 | tee "$TRAIN_LOG"
            else
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.models.train_model --year $YEAR --algorithm $ALGO 2>&1 | tee "$TRAIN_LOG"
            fi

            RUN_ID=$(grep "MLflow run_id" "$TRAIN_LOG" | awk '{print $NF}' | tail -1)
            rm -f "$TRAIN_LOG"

            if [ -z "$RUN_ID" ]; then
              echo "ERREUR : impossible de récupérer le run_id MLflow"
              exit 1
            fi
            echo "==> run_id = $RUN_ID"

            # ── 4. Validation + promotion ─────────────────────────────────────────
            # MODEL_NAME suit la convention : rf→rf_accidents, xgboost→xgb_accidents, lgbm→lgbm_accidents
            case "$ALGO" in
              xgboost) MODEL_NAME="xgb_accidents" ;;
              lgbm)    MODEL_NAME="lgbm_accidents" ;;
              *)       MODEL_NAME="rf_accidents" ;;
            esac
            echo "==> Validation (model: $MODEL_NAME)"
            if [ "$PROMOTE" = "true" ]; then
              docker compose run --rm api \
                python -m src.models.validate_model --run-id $RUN_ID --model-name $MODEL_NAME --promote
            else
              docker compose run --rm api \
                python -m src.models.validate_model --run-id $RUN_ID --model-name $MODEL_NAME
            fi

            # ── 5. Redémarrage API ────────────────────────────────────────────────
            echo "==> Redémarrage API (charge le nouveau modèle @Production)"
            docker compose restart api

            echo "==> Healthcheck (attente max 60s)"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8090/health > /dev/null 2>&1; then
                echo "API OK après $((i*5))s"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Timeout healthcheck"
                docker compose logs --tail=30 api
                exit 1
              fi
              sleep 5
            done

            # ── 6. Simulation production (données simulate_year sur nouveau modèle) ─
            echo "==> Simulation production : données $SIM_YEAR jouées sur modèle $YEAR"

            # Télécharger + préprocesser les données de simulation si besoin
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api \
              python -m src.data.import_raw_data --year $SIM_YEAR 2>/dev/null || true

            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api \
              python -m src.data.make_dataset --year $SIM_YEAR 2>/dev/null || true

            # Obtenir un token JWT depuis l'API directe (pas de rate limit)
            TOKEN=$(curl -sf -X POST http://localhost:8080/token \
              -d "username=${API_USERNAME:-admin}&password=${API_PASSWORD:-changeme}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

            # Rejouer les données via POST /predict (port 8080, sans rate limit)
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api \
              python scripts/simulate_production.py \
                --year $SIM_YEAR \
                --api-url http://api:8000 \
                --token "$TOKEN" \
                --delay-ms 5

            # ── 7. Détection drift ────────────────────────────────────────────────
            echo "==> Détection drift : données $SIM_YEAR vs référence entraînement $YEAR"

            # Calculer le chemin de référence selon l'année et le mode cumul
            if [ "$CUMUL" = "true" ] && [ "$YEAR" -gt "2021" ]; then
              YEARS_SEQ=$(seq -s _ 2021 $YEAR)
              REF_PATH="data/preprocessed/cumul_${YEARS_SEQ}/X_train.csv"
            else
              REF_PATH="data/preprocessed/${YEAR}/X_train.csv"
            fi
            echo "  Référence : $REF_PATH"

            DRIFT_MONTH=$(date +%Y-%m)
            echo "  Mois analysé : $DRIFT_MONTH (prédictions loggées ce mois)"

            mkdir -p reports/drift
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              -v "$(pwd)/reports:/app/reports" \
              api \
              python -m services.monitoring.drift_detection \
                --month "$DRIFT_MONTH" \
                --reference-path "$REF_PATH"

            echo "==> Pipeline complet terminé ✓ (train $YEAR → simulate $SIM_YEAR → drift)"
