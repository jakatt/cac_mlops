name: Train — trigger Prefect pipeline

# Déclenchement manuel uniquement.
# Le pipeline ML est entièrement orchestré par Prefect (train-flow/train).
# Pour enchaîner tous les cycles : utiliser full-retrain-flow/full-retrain depuis l'UI Prefect.
on:
  workflow_dispatch:
    inputs:
      year:
        description: "Année cible d'entraînement (ex: 2022 pour modèle 2021+2022)"
        required: true
        default: "2022"
      cumul:
        description: "Cumul depuis 2021 ? (true/false)"
        required: true
        default: "true"
      promote:
        description: "Promouvoir @Production si KPIs OK ? (true/false)"
        required: true
        default: "true"

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher train-flow via Prefect (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            YEAR="${{ github.event.inputs.year || '2022' }}"
            CUMUL="${{ github.event.inputs.cumul || 'true' }}"
            PROMOTE="${{ github.event.inputs.promote || 'true' }}"

            echo "==> Déclenchement train-flow : year=$YEAR cumul=$CUMUL promote=$PROMOTE"
            echo "==> Algorithme : auto-détecté depuis le modèle @Production"

            docker compose exec -T prefect-worker \
              prefect deployment run "train-flow/train" \
              --param year="$YEAR" \
              --param cumul="$CUMUL" \
              --param promote="$PROMOTE" \
              --watch

            echo "==> Pipeline terminé — vérifier MLflow et Gradio"
