name: Train вЂ” pipeline on Scaleway

on:
  # DГ©clenchement manuel uniquement :
  # - cycle annuel ONISR (nouvelles donnГ©es disponibles ~mai-juin)
  # - modГЁle ad-hoc fourni par un DS
  workflow_dispatch:
    inputs:
      year:
        description: "AnnГ©e cible d'entraГ®nement (ex: 2022 pour modГЁle 2021+2022)"
        required: true
        default: "2022"
      cumul:
        description: "Cumul depuis 2021 ? (true/false)"
        required: true
        default: "true"
      algorithm:
        description: "Algorithme : rf | xgboost | lgbm"
        required: false
        default: "rf"
      promote:
        description: "Promouvoir @Production si KPIs OK ? (true/false)"
        required: true
        default: "true"
      simulate_year:
        description: "AnnГ©e Г  rejouer via /predict pour drift (ex: 2023 quand year=2022). Vide = year+1"
        required: false
        default: ""

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Run pipeline sur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            YEAR="${{ github.event.inputs.year || '2022' }}"
            CUMUL="${{ github.event.inputs.cumul || 'true' }}"
            ALGO="${{ github.event.inputs.algorithm || 'rf' }}"
            PROMOTE="${{ github.event.inputs.promote || 'true' }}"
            SIM_YEAR="${{ github.event.inputs.simulate_year }}"
            if [ -z "$SIM_YEAR" ]; then
              SIM_YEAR=$((YEAR + 1))
            fi

            echo "==> ParamГЁtres : year=$YEAR cumul=$CUMUL algo=$ALGO promote=$PROMOTE simulate_year=$SIM_YEAR"

            # в”Ђв”Ђ 0. VГ©rification que l'API est disponible (max 3 min) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> Attente API disponible (max 3 min)..."
            for i in $(seq 1 36); do
              if curl -sf http://localhost:8090/health > /dev/null 2>&1; then
                echo "  API OK aprГЁs $((i*5))s"
                break
              fi
              if [ "$i" -eq 36 ]; then
                echo "ERREUR : API non disponible aprГЁs 3 min"
                docker compose ps
                docker compose logs --tail=30 api
                exit 1
              fi
              echo "  [$((i*5))s] Attente API..."
              sleep 5
            done

            # в”Ђв”Ђ 0b. Nettoyage MLflow (libГЁre espace MinIO avant entraГ®nement) в”Ђв”Ђв”Ђв”Ђ
            echo "==> Nettoyage anciens runs MLflow (conservation des 3 derniers)"
            docker compose exec -T api python3 /app/src/scripts/mlflow_cleanup.py || true

            echo "==> GC artifacts MinIO (suppression physique des runs effacГ©s)"
            docker compose run --rm mlflow mlflow gc \
              --backend-store-uri "postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}" \
              --experiment-ids 1 || true

            echo "==> Espace disque aprГЁs nettoyage"
            df -h /

            # в”Ђв”Ђ 0b. Cache DVC sur /data (block storage) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> Config cache DVC vers /data/dvc_cache (block storage)"
            dvc config --local cache.dir /data/dvc_cache

            # в”Ђв”Ђ 1. Pull donnГ©es DVC (entraГ®nement) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> Pull donnГ©es DVC (annГ©es 2021 в†’ $YEAR)"
            for y in 2021 2022 2023; do
              if [ "$y" -le "$YEAR" ]; then
                dvc pull data/raw/$y
              fi
            done

            # в”Ђв”Ђ 2. Preprocessing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> Preprocessing (dans le conteneur api)"
            if [ "$CUMUL" = "true" ]; then
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.make_dataset --year $YEAR --cumul
            else
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.make_dataset --year $YEAR
            fi

            # в”Ђв”Ђ 3. EntraГ®nement в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> LibГ©ration NVMe avant entraГ®nement (conteneurs arrГЄtГ©s + images dangling)"
            docker container prune -f
            docker image prune -f
            echo "==> Espace NVMe disponible"
            df -h /

            echo "==> EntraГ®nement (dans le conteneur api)"
            TRAIN_LOG=$(mktemp)
            if [ "$CUMUL" = "true" ]; then
              docker compose run --rm \
                -e MLFLOW_RUN_MODE=official \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.models.train_model --year $YEAR --cumul --algorithm $ALGO 2>&1 | tee "$TRAIN_LOG"
            else
              docker compose run --rm \
                -e MLFLOW_RUN_MODE=official \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.models.train_model --year $YEAR --algorithm $ALGO 2>&1 | tee "$TRAIN_LOG"
            fi

            RUN_ID=$(grep "MLflow run_id" "$TRAIN_LOG" | awk '{print $NF}' | tail -1)
            rm -f "$TRAIN_LOG"

            if [ -z "$RUN_ID" ]; then
              echo "ERREUR : impossible de rГ©cupГ©rer le run_id MLflow"
              exit 1
            fi
            echo "==> run_id = $RUN_ID"

            # в”Ђв”Ђ 4. Validation + promotion в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            # MODEL_NAME suit la convention : rfв†’rf_accidents, xgboostв†’xgb_accidents, lgbmв†’lgbm_accidents
            case "$ALGO" in
              xgboost) MODEL_NAME="xgb_accidents" ;;
              lgbm)    MODEL_NAME="lgbm_accidents" ;;
              *)       MODEL_NAME="rf_accidents" ;;
            esac
            echo "==> Validation (model: $MODEL_NAME)"
            if [ "$PROMOTE" = "true" ]; then
              docker compose run --rm api \
                python -m src.models.validate_model --run-id $RUN_ID --model-name $MODEL_NAME --promote
            else
              # Mode benchmark : rapport KPI sans bloquer le pipeline
              docker compose run --rm api \
                python -m src.models.validate_model --run-id $RUN_ID --model-name $MODEL_NAME || true
            fi

            # в”Ђв”Ђ 5. RedГ©marrage API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            echo "==> RedГ©marrage API (charge le nouveau modГЁle @Production)"
            docker compose restart api

            echo "==> Healthcheck (attente max 60s)"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8090/health > /dev/null 2>&1; then
                echo "API OK aprГЁs $((i*5))s"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Timeout healthcheck"
                docker compose logs --tail=30 api
                exit 1
              fi
              sleep 5
            done

            # в”Ђв”Ђ 6. Simulation production (skip en mode benchmark promote=false) в”Ђв”Ђ
            if [ "$PROMOTE" = "true" ]; then
              echo "==> Simulation production : donnГ©es $SIM_YEAR jouГ©es sur modГЁle $YEAR"

              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.import_raw_data --year $SIM_YEAR 2>/dev/null || true

              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python -m src.data.make_dataset --year $SIM_YEAR 2>/dev/null || true

              TOKEN=$(curl -sf -X POST http://localhost:8080/token \
                -d "username=${API_USERNAME:-admin}&password=${API_PASSWORD:-changeme}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                api \
                python scripts/simulate_production.py \
                  --year $SIM_YEAR \
                  --api-url http://api:8000 \
                  --token "$TOKEN" \
                  --max-rows 3000 \
                  --delay-ms 0

              # в”Ђв”Ђ 7. DГ©tection drift в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
              echo "==> DГ©tection drift : donnГ©es $SIM_YEAR vs rГ©fГ©rence entraГ®nement $YEAR"

              if [ "$CUMUL" = "true" ] && [ "$YEAR" -gt "2021" ]; then
                YEARS_SEQ=$(seq -s _ 2021 $YEAR)
                REF_PATH="data/preprocessed/cumul_${YEARS_SEQ}/X_train.csv"
              else
                REF_PATH="data/preprocessed/${YEAR}/X_train.csv"
              fi
              echo "  RГ©fГ©rence : $REF_PATH"

              DRIFT_MONTH=$(date +%Y-%m)
              mkdir -p reports/drift
              docker compose run --rm \
                -v "$(pwd)/data:/app/data" \
                -v "$(pwd)/reports:/app/reports" \
                api \
                python -m services.monitoring.drift_detection \
                  --month "$DRIFT_MONTH" \
                  --reference-path "$REF_PATH"

              echo "==> Pipeline complet terminГ© вњ“ (train $YEAR в†’ simulate $SIM_YEAR в†’ drift)"
            else
              echo "==> Mode benchmark (promote=false) : simulation + drift ignorГ©s"
              echo "==> Pipeline benchmark terminГ© вњ“ (train $YEAR вЂ” mГ©triques dans MLflow)"
            fi
