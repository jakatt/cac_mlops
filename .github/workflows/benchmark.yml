name: Benchmark — RF vs XGBoost vs LightGBM (3 configs)

# Lance 9 entraînements séquentiels : 3 algos × 3 configs d'années
# Le workflow est autonome : nettoyage NVMe embarqué avant de démarrer
# Aucune promotion automatique — l'opérateur promeut manuellement le meilleur

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USER:  ${{ github.actor }}

    steps:
      - name: Benchmark multi-algo sur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_USER
          command_timeout: 175m
          script: |
            # pipefail : l'exit code du pipe = exit code de la commande la plus a gauche
            # Sans ca, "docker train | tee log" masque les echecs de docker train
            set -eo pipefail
            export PATH=$PATH:/home/deploy/.local/bin
            cd ${{ secrets.DEPLOY_DIR }}

            echo "================================================"
            echo "  BENCHMARK -- RF / XGBoost / LightGBM"
            echo "  3 configs : 2021 | 2021+2022 | 2021+2022+2023"
            echo "================================================"

            # ── LOGIN ghcr.io ─────────────────────────────────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── 0. NETTOYAGE + CONFIG DVC CACHE ──────────────────────────────
            echo ""
            echo "==> [0/5] Nettoyage + config DVC"
            echo "    Etat avant :"
            df -h /

            # Rediriger le cache DVC vers /data (block storage 74GB, pas le NVMe 17GB)
            # .dvc/config.local est gitignore -> persiste apres git reset --hard
            dvc config --local cache.dir /data/dvc_cache
            echo "    Cache DVC : $(dvc config cache.dir)"

            # Nettoyer residus eventuels sur le NVMe
            rm -rf .dvc/cache data/raw

            docker container prune -f
            docker image prune -f
            docker builder prune -f
            docker network prune -f

            for f in /var/lib/docker/containers/*/*-json.log; do
              [ -f "$f" ] && truncate -s 0 "$f"
            done

            find /tmp -maxdepth 2 -type f -mtime +0 -delete 2>/dev/null || true
            journalctl --vacuum-size=200M 2>/dev/null || true

            echo "    Etat apres nettoyage :"
            df -h /

            # ── Services Docker up + sains (apres liberation du disque) ───────
            echo "==> Verification services Docker"
            docker compose pull --quiet 2>/dev/null || true
            docker compose up -d
            echo "    Attente healthcheck MLflow (max 60s)"
            for i in $(seq 1 12); do
              if docker compose exec -T mlflow curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "    MLflow healthy apres $((i*5))s"; break
              fi
              sleep 5
            done

            # ── 1. NETTOYAGE MLFLOW ───────────────────────────────────────────
            echo ""
            echo "==> [1/5] Nettoyage MLflow"
            docker compose exec -T api \
              python3 /app/src/scripts/mlflow_cleanup.py 2>/dev/null || true

            docker compose run --rm mlflow mlflow gc \
              --backend-store-uri "postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgresql:5432/${POSTGRES_DB:-mlops}" \
              --experiment-ids 1 2>/dev/null || true

            # ── 2. DVC PULL ───────────────────────────────────────────────────
            echo ""
            echo "==> [2/5] Pull donnees DVC"
            dvc pull data/raw/2021
            dvc pull data/raw/2022
            dvc pull data/raw/2023
            echo "    NVMe apres pull :"
            df -h / | tail -1

            # ── 3. PREPROCESSING ─────────────────────────────────────────────
            echo ""
            echo "==> [3/5] Preprocessing"

            echo "  config 1/3 : annee 2021 seule"
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api python -m src.data.make_dataset --year 2021

            echo "  config 2/3 : cumul 2021+2022"
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api python -m src.data.make_dataset --year 2022 --cumul

            echo "  config 3/3 : cumul 2021+2022+2023"
            docker compose run --rm \
              -v "$(pwd)/data:/app/data" \
              api python -m src.data.make_dataset --year 2023 --cumul

            # Supprimer donnees brutes + cache DVC apres preprocessing
            # Le cache DVC vient d'etre reconstruit par les dvc pull -> le vider a nouveau
            echo "  Suppression data/raw + cache DVC apres preprocessing"
            rm -rf data/raw .dvc/cache
            docker container prune -f
            echo "    NVMe apres suppression :"
            df -h / | tail -1

            # ── 4. ENTRAINEMENTS (9 runs) ────────────────────────────────────
            echo ""
            echo "==> [4/5] Entrainements (9 runs)"

            RESULTS=""
            FAILED=""

            # Fonction : s'assurer que MLflow est healthy avant chaque training
            ensure_mlflow_healthy() {
              for i in $(seq 1 6); do
                if docker compose exec -T mlflow curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                  return 0
                fi
                echo "    MLflow unhealthy, restart..."
                docker compose restart mlflow
                sleep 10
              done
              echo "    MLflow toujours unhealthy apres restart"
              return 1
            }

            for ALGO in rf xgboost lgbm; do
              for CONFIG in "2021:false" "2022:true" "2023:true"; do
                YEAR=$(echo $CONFIG | cut -d: -f1)
                CUMUL=$(echo $CONFIG | cut -d: -f2)

                echo ""
                echo "  --- $ALGO / annee=$YEAR / cumul=$CUMUL ---"

                # Nettoyage + healthcheck MLflow avant chaque run
                docker container prune -f
                for f in /var/lib/docker/containers/*/*-json.log; do
                  [ -f "$f" ] && truncate -s 0 "$f"
                done
                df -h / | tail -1
                ensure_mlflow_healthy || { echo "  SKIP : MLflow non disponible"; FAILED="$FAILED $ALGO-$YEAR"; continue; }

                # Entrainement (pipefail actif : echec docker = echec pipeline)
                TRAIN_LOG=$(mktemp)
                set +e  # desactiver exit-on-error pour capturer l'exit code manuellement
                if [ "$CUMUL" = "true" ]; then
                  docker compose run --rm \
                    -v "$(pwd)/data:/app/data" \
                    api python -m src.models.train_model \
                      --year $YEAR --cumul --algorithm $ALGO \
                    2>&1 | tee "$TRAIN_LOG"
                  TRAIN_EXIT=${PIPESTATUS[0]}
                else
                  docker compose run --rm \
                    -v "$(pwd)/data:/app/data" \
                    api python -m src.models.train_model \
                      --year $YEAR --algorithm $ALGO \
                    2>&1 | tee "$TRAIN_LOG"
                  TRAIN_EXIT=${PIPESTATUS[0]}
                fi
                set -e

                if [ "$TRAIN_EXIT" -ne 0 ]; then
                  echo "  ECHEC train $ALGO/$YEAR (exit=$TRAIN_EXIT)"
                  cat "$TRAIN_LOG" | tail -10
                  FAILED="$FAILED $ALGO-$YEAR"
                  rm -f "$TRAIN_LOG"
                  continue
                fi

                RUN_ID=$(grep "MLflow run_id" "$TRAIN_LOG" | awk '{print $NF}' | tail -1)
                METRICS=$(grep "Metrics" "$TRAIN_LOG" | tail -1)
                rm -f "$TRAIN_LOG"

                if [ -z "$RUN_ID" ]; then
                  echo "  ECHEC : run_id non trouve dans les logs"
                  FAILED="$FAILED $ALGO-$YEAR"
                  continue
                fi

                echo "  OK : run_id=$RUN_ID"
                echo "  $METRICS"

                # Validation sans promotion
                case "$ALGO" in
                  xgboost) MODEL_NAME="xgb_accidents" ;;
                  lgbm)    MODEL_NAME="lgbm_accidents" ;;
                  *)       MODEL_NAME="rf_accidents" ;;
                esac

                set +e
                docker compose run --rm api \
                  python -m src.models.validate_model \
                    --run-id $RUN_ID --model-name $MODEL_NAME \
                  2>/dev/null
                set -e

                RESULTS="$RESULTS $ALGO/$YEAR"
              done
            done

            # ── 5. RESUME ────────────────────────────────────────────────────
            echo ""
            echo "==> [5/5] Resume"
            echo "    NVMe final :"
            df -h /

            echo ""
            echo "================================================"
            echo "  BENCHMARK TERMINE"
            echo "  Reussis :$RESULTS"
            if [ -n "$FAILED" ]; then
              echo "  Echoues :$FAILED"
            fi
            echo ""
            echo "  Comparer dans MLflow -> experiments -> accidents_severity"
            echo "  Colonnes : algorithm / f1 / auc / accuracy / recall"
            echo "================================================"

            if [ -z "$RESULTS" ]; then
              echo "ERREUR : aucun run reussi"
              exit 1
            fi
