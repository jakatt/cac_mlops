name: Ops — Resize filesystem NVMe

# One-shot : a lancer apres un agrandissement de volume Scaleway
# Utilise docker run --privileged pour contourner les restrictions sudo sur resize2fs
# (l'utilisateur deploy n'a pas NOPASSWD pour resize2fs mais peut lancer docker)

on:
  workflow_dispatch:

jobs:
  resize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resize filesystem sur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -e

            echo "==> Etat AVANT resize"
            df -h
            echo ""
            lsblk -o NAME,SIZE,FSTYPE,MOUNTPOINT

            # Detection du type de filesystem sur sda
            FSTYPE=$(lsblk -no FSTYPE /dev/sda 2>/dev/null | head -1)
            echo ""
            echo "==> /dev/sda : device=$(lsblk -no SIZE /dev/sda | head -1), type=$FSTYPE"

            # Resize via container Docker privilegie (pas de sudo requis)
            # alpine + e2fsprogs ou xfsprogs selon le type
            case "$FSTYPE" in
              ext4|ext3|ext2)
                echo "==> resize2fs via docker --privileged (ext4)"
                docker run --rm --privileged -v /dev:/dev \
                  alpine:latest \
                  sh -c "apk add --quiet e2fsprogs > /dev/null 2>&1 && resize2fs /dev/sda && echo 'resize2fs OK'"
                ;;
              xfs)
                echo "==> xfs_growfs via docker --privileged (xfs)"
                docker run --rm --privileged -v /proc:/proc -v /sys:/sys -v /data:/data \
                  alpine:latest \
                  sh -c "apk add --quiet xfsprogs > /dev/null 2>&1 && xfs_growfs /data && echo 'xfs_growfs OK'"
                ;;
              *)
                echo "ERREUR : type de filesystem inconnu : '$FSTYPE'"
                docker run --rm --privileged -v /dev:/dev alpine:latest blkid /dev/sda
                exit 1
                ;;
            esac

            echo ""
            echo "==> /data apres resize :"
            df -h /data

            echo ""
            echo "==> Etat final"
            df -h
            lsblk -o NAME,SIZE,FSTYPE,MOUNTPOINT
