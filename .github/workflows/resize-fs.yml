name: Ops — Resize filesystem NVMe

# One-shot : a lancer apres un agrandissement de volume Scaleway
# Etend la partition + le filesystem pour utiliser tout l'espace disponible

on:
  workflow_dispatch:

jobs:
  resize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resize filesystem sur Scaleway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "==> Etat actuel"
            df -h
            echo ""
            lsblk

            echo ""
            echo "==> Extension /data (sda -> 74.5GB, filesystem bloque a 19GB)"
            # sda est formate directement (pas de partition) -> resize2fs direct
            sudo resize2fs /dev/sda
            echo "  /data etendu"

            echo ""
            echo "==> Extension / (vda1 -> 17.6GB, verif si necessaire)"
            sudo growpart /dev/vda 1 || echo "  vda1 : deja a la bonne taille"
            sudo resize2fs /dev/vda1 || echo "  vda1 filesystem : deja a la bonne taille"

            echo ""
            echo "==> Etat apres resize"
            df -h
            echo ""
            lsblk
