name: Diag — disk + all apps

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Full server diagnostic
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SCALEWAY_HOST }}
          username: ${{ secrets.SCALEWAY_USER }}
          key:      ${{ secrets.SCALEWAY_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== lsblk ==="
            lsblk -o NAME,SIZE,TYPE,MOUNTPOINT,FSTYPE

            echo "=== df -h ==="
            df -h

            echo "=== ALL Docker containers (all projects) ==="
            docker ps --all --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo "=== Docker images ==="
            docker image ls --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

            echo "=== docker system df ==="
            docker system df -v 2>/dev/null | head -60

            echo "=== Open ports (listening) ==="
            ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null

            echo "=== Docker Compose projects ==="
            docker compose ls 2>/dev/null || echo "docker compose ls not available"

            echo "=== /data contents ==="
            ls -la /data/ 2>/dev/null || echo "cannot list /data"

            echo "=== /data disk usage by dir ==="
            du -sh /data/*/ 2>/dev/null || echo "no subdirs in /data"
