# Upgrade header pour WebSocket Gradio
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate-limit zones par endpoint
limit_req_zone $binary_remote_addr zone=predict_ratelimit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=token_ratelimit:10m  rate=5r/m;

server {
    listen 80;
    server_name _;

    # DNS Docker interne — re-résolution toutes les 30s
    # Évite le cache IP au démarrage quand l'API est recréée par docker compose up
    resolver 127.0.0.11 valid=30s ipv6=off;

    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host            $host;
    server_tokens off;

    # ── API — /predict (rate-limited) ──────────────────────────────────────────
    location = /predict {
        limit_req zone=predict_ratelimit burst=5 nodelay;
        limit_req_status 429;
        set $api api:8000;
        proxy_pass http://$api;
        proxy_read_timeout 30s;
    }

    # ── API — autres endpoints FastAPI ─────────────────────────────────────────
    location = /health {
        set $api api:8000;
        proxy_pass http://$api;
    }
    location = /token {
        limit_req zone=token_ratelimit burst=3 nodelay;
        limit_req_status 429;
        set $api api:8000;
        proxy_pass http://$api;
    }
    location = /metrics {
        set $api api:8000;
        proxy_pass http://$api;
    }
    location = /openapi.json {
        set $api api:8000;
        proxy_pass http://$api;
    }
    location /docs {
        set $api api:8000;
        proxy_pass http://$api;
    }
    location /redoc {
        set $api api:8000;
        proxy_pass http://$api;
    }

    # ── Drift reports — Evidently HTML (statique) ───────────────────────────────
    location /reports/ {
        alias /srv/reports/;
        add_header X-Content-Type-Options nosniff;
        autoindex off;
    }

    # ── nginx exporter — réseau Docker uniquement ───────────────────────────────
    location = /stub_status {
        stub_status;
        allow 172.0.0.0/8;
        deny all;
    }

    # ── Cockpit public Gradio — tout le reste ──────────────────────────────────
    location / {
        set $gradio gradio-public:7862;
        proxy_pass         http://$gradio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }
}
