# Rate-limit zone: 20 requests / minute per client IP on /predict
limit_req_zone $binary_remote_addr zone=predict_ratelimit:10m rate=20r/m;

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Forward real client IP to the API
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host            $host;

    # Disable server tokens in error responses
    server_tokens off;

    # /predict — rate limited, burst of 5 then reject with 429
    location = /predict {
        limit_req zone=predict_ratelimit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
        proxy_read_timeout 30s;
    }

    # Everything else passes through without rate limiting
    location / {
        proxy_pass http://api_backend;
        proxy_read_timeout 60s;
    }
}
