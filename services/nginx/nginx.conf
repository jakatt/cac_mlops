# Upgrade header pour WebSocket Gradio
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate-limit zone: 20 requests / minute per client IP on /predict
limit_req_zone $binary_remote_addr zone=predict_ratelimit:10m rate=20r/m;

upstream api_backend {
    server api:8000;
}

upstream gradio_public {
    server gradio-public:7862;
}

server {
    listen 80;
    server_name _;

    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host            $host;
    server_tokens off;

    # ── API — /predict (rate-limited) ──────────────────────────────────────────
    location = /predict {
        limit_req zone=predict_ratelimit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
        proxy_read_timeout 30s;
    }

    # ── API — autres endpoints FastAPI ─────────────────────────────────────────
    location = /health       { proxy_pass http://api_backend; }
    location = /token        { proxy_pass http://api_backend; }
    location = /metrics      { proxy_pass http://api_backend; }
    location = /openapi.json { proxy_pass http://api_backend; }
    location /docs           { proxy_pass http://api_backend; }
    location /redoc          { proxy_pass http://api_backend; }

    # ── Drift reports — Evidently HTML (statique) ───────────────────────────────
    location /reports/ {
        alias /srv/reports/;
        add_header X-Content-Type-Options nosniff;
        autoindex off;
    }

    # ── nginx exporter — réseau Docker uniquement ───────────────────────────────
    location = /stub_status {
        stub_status;
        allow 172.0.0.0/8;
        deny all;
    }

    # ── Cockpit public Gradio — tout le reste ──────────────────────────────────
    location / {
        proxy_pass         http://gradio_public;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;   # nécessaire pour SSE / streaming Gradio
    }
}
