apiVersion: v1
kind: Service
metadata:
  name: gradio
  namespace: cac-mlops
  labels:
    app: gradio
spec:
  # ClusterIP — plus de LoadBalancer public. Le Cockpit (Orchestration,
  # RAZ, kapsule-down...) n'a aucune authentification applicative (comme
  # sur le VPS) : seul reachable via le subnet-router Tailscale
  # (k8s/tailscale/), jamais exposé publiquement (incident vécu, 2026-07-10 —
  # Cockpit K8s wide open sans login le temps d'un premier test).
  type: ClusterIP
  selector:
    app: gradio
  ports:
  - port: 7860
    targetPort: 7860
    protocol: TCP
