apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradio
  namespace: cac-mlops
  labels:
    app: gradio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gradio
  template:
    metadata:
      labels:
        app: gradio
    spec:
      initContainers:
      - name: fetch-model
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          aws s3 cp s3://cac-mlops-data/k8s-model/trained_model.joblib \
            /app/model/trained_model.joblib \
            --endpoint-url https://s3.fr-par.scw.cloud
          aws s3 cp s3://cac-mlops-data/k8s-model/model_info.txt \
            /app/model/model_info.txt \
            --endpoint-url https://s3.fr-par.scw.cloud \
            || echo "model_info.txt absent (export précédent au fix) — footer générique"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: fr-par
        volumeMounts:
        - name: model-volume
          mountPath: /app/model

      - name: fetch-data
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          aws s3 cp s3://cac-mlops-data/k8s-gradio-data/X_test.csv /app/data/X_test.csv \
            --endpoint-url https://s3.fr-par.scw.cloud
          aws s3 cp s3://cac-mlops-data/k8s-gradio-data/y_test.csv /app/data/y_test.csv \
            --endpoint-url https://s3.fr-par.scw.cloud
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: fr-par
        volumeMounts:
        - name: data-volume
          mountPath: /app/data

      containers:
      - name: gradio
        image: ghcr.io/jakatt/cac-mlops-gradio:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7860
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow:5000"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "https://s3.fr-par.scw.cloud"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: GRADIO_MODEL_NAME
          value: "lgbm_accidents"
        - name: GRADIO_MODEL_ALIAS
          value: "Production"
        - name: GRADIO_DATA_PATH
          value: "/app/data"
        - name: GRADIO_PORT
          value: "7860"
        - name: LOCAL_MODEL_PATH
          value: "/app/model/trained_model.joblib"
        volumeMounts:
        - name: model-volume
          mountPath: /app/model
        - name: data-volume
          mountPath: /app/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 30

      volumes:
      - name: model-volume
        emptyDir: {}
      - name: data-volume
        emptyDir: {}
