# RBAC scopé au namespace cac-mlops uniquement (moindre privilège) — on ne
# veut que les métriques de replicas des Deployments api/gradio/gradio-public
# pendant les rolling updates, pas une vision cluster-wide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: cac-mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-state-metrics
  namespace: cac-mlops
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-state-metrics
  namespace: cac-mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kube-state-metrics
subjects:
- kind: ServiceAccount
  name: kube-state-metrics
  namespace: cac-mlops
