# Cockpit public (3 onglets : Predict / What-If / Points Noirs) — équivalent
# du gradio-public du VPS. Jamais de Service public direct : seul nginx
# (via Caddy) y accède, comme sur le VPS ("pas de port hôte").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradio-public
  namespace: cac-mlops
  labels:
    app: gradio-public
spec:
  # 2 répliques : gradio-public est sur le chemin public (seul point d'accès
  # utilisateur pour Predict/What-If/Points Noirs), donc SPOF critique à 1
  # seule réplique malgré la stratégie de rollout déjà correcte ci-dessous
  # (2026-07-12 — cf. discussion résilience chemin public complet).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gradio-public
  template:
    metadata:
      labels:
        app: gradio-public
    spec:
      # Répartit les répliques sur des nœuds différents quand possible — sans
      # ça le scheduler peut placer les 2 sur le même nœud, rendant illusoire
      # la protection contre une panne de nœud (constaté en direct, 2026-07-14).
      # ScheduleAnyway (souple) : cluster à 2 nœuds seulement, déjà sujet à de
      # la pression ressources — éviter des pods bloqués en Pending.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: gradio-public
      initContainers:
      - name: fetch-model
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          aws s3 cp s3://cac-mlops-data/k8s-model/trained_model.joblib \
            /app/model/trained_model.joblib \
            --endpoint-url https://s3.fr-par.scw.cloud
          aws s3 cp s3://cac-mlops-data/k8s-model/model_info.txt \
            /app/model/model_info.txt \
            --endpoint-url https://s3.fr-par.scw.cloud \
            || echo "model_info.txt absent (export précédent au fix) — footer générique"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: fr-par
        volumeMounts:
        - name: model-volume
          mountPath: /app/model

      - name: fetch-data
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          aws s3 cp s3://cac-mlops-data/k8s-gradio-data/X_test.csv /app/data/X_test.csv \
            --endpoint-url https://s3.fr-par.scw.cloud
          aws s3 cp s3://cac-mlops-data/k8s-gradio-data/y_test.csv /app/data/y_test.csv \
            --endpoint-url https://s3.fr-par.scw.cloud
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: fr-par
        volumeMounts:
        - name: data-volume
          mountPath: /app/data

      containers:
      - name: gradio-public
        image: ghcr.io/jakatt/cac-mlops-gradio:latest
        imagePullPolicy: Always
        command: ["python", "services/gradio/app_public.py"]
        ports:
        - containerPort: 7862
        env:
        # LOCAL_MODEL_PATH ci-dessous est toujours défini, donc _get_model()
        # (app_public.py) ne passe normalement jamais par la branche MLflow
        # — mais si jamais le fichier local est absent (initContainer
        # fetch-model en échec), le client HTTP MLflow retente PAR DÉFAUT
        # 7 fois avec backoff exponentiel (jusqu'à 120s de timeout) avant
        # d'abandonner une connexion qui échoue, quel que soit le mode
        # d'échec (DNS ou TCP refusé) — MAX_RETRIES=0 + TIMEOUT court forcent
        # un échec sur la toute première tentative (bug vécu en direct sur
        # le pod api, même mécanisme, 2026-07-15).
        - name: MLFLOW_HTTP_REQUEST_MAX_RETRIES
          value: "0"
        - name: MLFLOW_HTTP_REQUEST_TIMEOUT
          value: "3"
        - name: MLFLOW_TRACKING_URI
          value: "http://127.0.0.1:1"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: GRADIO_MODEL_NAME
          value: "lgbm_accidents"
        - name: GRADIO_MODEL_ALIAS
          value: "Production"
        - name: GRADIO_DATA_PATH
          value: "/app/data"
        - name: GRADIO_PORT
          value: "7862"
        - name: GRADIO_PUBLIC_URL
          value: "https://kapsule.jakat-inc.fr"
        - name: LOCAL_MODEL_PATH
          value: "/app/model/trained_model.joblib"
        volumeMounts:
        - name: model-volume
          mountPath: /app/model
        - name: data-volume
          mountPath: /app/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /
            port: 7862
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /
            port: 7862
          initialDelaySeconds: 60
          periodSeconds: 30

      volumes:
      - name: model-volume
        emptyDir: {}
      - name: data-volume
        emptyDir: {}
