apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cac-mlops
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: /var/lib/grafana/dashboards/api-performance.json
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: provisioning-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: provisioning-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      volumes:
      - name: grafana-data
        emptyDir: {}
      # ConfigMaps créés par kapsule-up.yml depuis les fichiers du repo
      - name: provisioning-datasources
        configMap:
          name: grafana-provisioning-datasources
      - name: provisioning-dashboards
        configMap:
          name: grafana-provisioning-dashboards
      - name: dashboards
        configMap:
          name: grafana-dashboards
