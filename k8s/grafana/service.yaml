apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cac-mlops
spec:
  # ClusterIP — sur le VPS, grafana est lié à ${VPS_TAILSCALE_IP} (jamais
  # public), même en ayant sa propre authentification. Parité : seul
  # reachable via le subnet-router Tailscale (k8s/tailscale/).
  type: ClusterIP
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
