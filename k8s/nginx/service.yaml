apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: cac-mlops
  annotations:
    # Kapsule provisionne un Scaleway Load Balancer automatiquement
    service.beta.kubernetes.io/scw-loadbalancer-type: "LB-S"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
