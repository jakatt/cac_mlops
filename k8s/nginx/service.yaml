apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: cac-mlops
spec:
  # ClusterIP — Caddy (k8s/caddy/) devient le seul point d'entrée public
  # (TLS + HTTP->HTTPS), nginx passe interne (rate-limiting/routing inchangés).
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
