apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: cac-mlops
  labels:
    app: nginx
spec:
  # 2 répliques : nginx est sur le chemin de TOUTE requête publique (caddy →
  # nginx → api/gradio-public) — SPOF à 1 seule réplique rendrait la haute
  # dispo d'api sans effet, personne ne pouvant plus l'atteindre (2026-07-12).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # Répartit les répliques sur des nœuds différents quand possible — sans
      # ça le scheduler peut placer les 2 sur le même nœud, rendant illusoire
      # la protection contre une panne de nœud (constaté en direct, 2026-07-14).
      # ScheduleAnyway (souple) : cluster à 2 nœuds seulement, déjà sujet à de
      # la pression ressources — éviter des pods bloqués en Pending.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: nginx
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
