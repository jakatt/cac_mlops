apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  namespace: cac-mlops
spec:
  # ClusterIP — Prefect OSS n'a aucune authentification native. Seul
  # reachable via le subnet-router Tailscale (k8s/tailscale/), jamais
  # exposé publiquement (incident vécu, 2026-07-10 — UI/API Prefect wide
  # open sans login le temps d'un premier test).
  type: ClusterIP
  selector:
    app: prefect-server
  ports:
  - port: 4200
    targetPort: 4200
