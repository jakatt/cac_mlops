apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: cac-mlops
  labels:
    app: prefect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
      - name: prefect-server
        image: prefecthq/prefect:3-latest
        command:
        - prefect
        - server
        - start
        - --host=0.0.0.0
        - --port=4200
        ports:
        - containerPort: 4200
        # PREFECT_UI_API_URL est patché par kapsule-up.yml après obtention de l'IP du LB
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 10
