apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: cac-mlops
  labels:
    app: prefect-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-worker
  template:
    metadata:
      labels:
        app: prefect-worker
    spec:
      containers:
      - name: prefect-worker
        image: ghcr.io/jakatt/cac-mlops-api:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          prefect work-pool create default-process-pool --type process 2>/dev/null || true
          prefect worker start --pool default-process-pool
        envFrom:
        - configMapRef:
            name: cac-mlops-config
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-creds
              key: POSTGRES_PASSWORD
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
