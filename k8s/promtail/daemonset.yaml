apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: cac-mlops
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:3.4.3
        args:
          - -config.file=/etc/promtail/promtail.yaml
        env:
        # Promtail restreint automatiquement kubernetes_sd_configs à
        # spec.nodeName=$(HOSTNAME) (logique : un DaemonSet ne peut de
        # toute façon lire que les logs hostPath de SON propre nœud). Sans
        # cet override, $HOSTNAME vaut le nom du POD (comportement par
        # défaut d'un conteneur), jamais un nom de nœud réel → sélecteur
        # qui ne matche jamais rien, 0 target découvert (bug vécu,
        # 2026-07-12 — le classique piège documenté dans le chart Helm
        # officiel promtail, reproduit ici en manifest brut).
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: pods-logs
          mountPath: /var/log/pods
          readOnly: true
        - name: positions
          mountPath: /run/promtail
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 96Mi
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: pods-logs
        hostPath:
          path: /var/log/pods
      - name: positions
        emptyDir: {}
