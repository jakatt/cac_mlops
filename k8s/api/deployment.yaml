apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cac-mlops
  labels:
    app: api
spec:
  # Pas de `replicas:` ici volontairement — api-hpa.yaml (minReplicas: 2,
  # maxReplicas: 8) gère ce champ dynamiquement. Le fixer ici ferait
  # régresser le nombre de réplicas à chaque `kubectl apply` (dont
  # deploy_kapsule_flow.py::apply_manifests, exécuté avant CHAQUE rollout
  # depuis PR127) — le Deployment controller redescend à la valeur écrite
  # ici, le HPA la remonte aussitôt, provoquant un aller-retour
  # création/suppression de pods pile pendant la fenêtre du rollout (bug
  # vécu : rollout `api` timeout à 300s, 2026-07-11, malgré un rollout déjà
  # séquentiel et un cluster sans pression ressources — traces d'events
  # ScalingReplicaSet 2→3 puis HPA rescale→2 exactement pendant l'échec).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # Répartit les répliques sur des nœuds différents quand possible — sans
      # ça (constaté en direct, 2026-07-14) le scheduler K8s peut placer les 2
      # répliques sur le MÊME nœud, rendant la HA illusoire face à une panne
      # de nœud (tout tombe en même temps malgré les 2 réplicas). ScheduleAnyway
      # (pas DoNotSchedule) : cluster à 2 nœuds seulement, déjà sujet à de la
      # pression ressources (incident DiskPressure 2026-07-10) — préférer une
      # contrainte souple à des pods bloqués en Pending si un nœud est chargé.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: api
      initContainers:
      - name: fetch-model
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          aws s3 cp s3://cac-mlops-data/k8s-model/trained_model.joblib \
            /app/model/trained_model.joblib \
            --endpoint-url https://s3.fr-par.scw.cloud
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: fr-par
        volumeMounts:
        - name: model-volume
          mountPath: /app/model

      containers:
      - name: api
        image: ghcr.io/jakatt/cac-mlops-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: cac-mlops-config
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-creds
              key: JWT_SECRET_KEY
        - name: API_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-creds
              key: API_USERNAME
        - name: API_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-creds
              key: API_PASSWORD
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: AWS_SECRET_ACCESS_KEY
        volumeMounts:
        - name: model-volume
          mountPath: /app/model
        resources:
          # memory request/limit corrigés 2026-07-24 : mesuré 656-782Mi réel
          # par pod à CPU quasi nul (chargement des 3 modèles ML rf/xgboost/
          # lgbm en mémoire au démarrage — coût fixe par pod, pas lié au
          # trafic). L'ancienne requête (512Mi) était déjà dépassée de 30-50%
          # à l'idle, ce qui faussait le %util mémoire vu par le HPA (cf.
          # api-hpa.yaml — mémoire retirée des métriques pour cette raison).
          requests:
            cpu: 200m
            memory: 800Mi
          limits:
            cpu: "1"
            memory: 1536Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20

      volumes:
      - name: model-volume
        emptyDir: {}
