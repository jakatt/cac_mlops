apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cac-mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: cac-mlops-api
        static_configs:
          - targets: ['api:8000']
        metrics_path: /metrics
