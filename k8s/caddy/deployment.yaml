# Point d'entrée public unique de Kapsule — TLS (Let's Encrypt automatique)
# devant nginx (rate-limiting/routing inchangés). 2 répliques (2026-07-12,
# SPOF critique sinon : peu importe la HA d'api si le seul caddy tombe,
# plus personne n'atteint quoi que ce soit) — le certificat est donc
# partagé via stockage S3 (image custom ghcr.io/jakatt/cac-mlops-caddy,
# cf. services/caddy/Dockerfile + k8s/caddy/configmap.yaml), plus en
# emptyDir local qui empêcherait 2 pods de partager le même certificat.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: cac-mlops
  labels:
    app: caddy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      # Répartit les répliques sur des nœuds différents quand possible — sans
      # ça le scheduler peut placer les 2 sur le même nœud, rendant illusoire
      # la protection contre une panne de nœud (constaté en direct, 2026-07-14).
      # ScheduleAnyway (souple) : cluster à 2 nœuds seulement, déjà sujet à de
      # la pression ressources — éviter des pods bloqués en Pending.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: caddy
      containers:
      - name: caddy
        image: ghcr.io/jakatt/cac-mlops-caddy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        - containerPort: 443
        env:
        # Clé IAM dédiée, restreinte au préfixe caddy-certs/ via bucket
        # policy (pas s3-creds — évite d'exposer les credentials globaux du
        # bucket dans les logs `tls` internes de Caddy, cf. finding sécurité
        # noté lors de la PR HA Caddy).
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: caddy-s3-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: caddy-s3-creds
              key: AWS_SECRET_ACCESS_KEY
        volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
        - name: caddy-data
          mountPath: /data
        - name: caddy-config-dir
          mountPath: /config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: caddy-config
        configMap:
          name: caddy-config
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config-dir
        emptyDir: {}
