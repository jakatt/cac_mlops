name: cac-mlops
prefect-version: "3.*"

# No remote build/push — flows run as local processes on the worker
build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ── ETL — manual or called from retrain ──────────────────────────────────────
  - name: etl
    entrypoint: src/flows/etl_flow.py:etl_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true

  # ── Train — manual trigger ────────────────────────────────────────────────────
  - name: train
    entrypoint: src/flows/train_flow.py:train_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true
      promote: true

  # ── Retrain annuel — déclenché manuellement quand les données ONISR de l'année N
  # sont disponibles (~juin de l'année N+2). Pas de cron : réentraîner sur les
  # mêmes données produirait un modèle identique.
  - name: retrain-annual
    entrypoint: src/flows/retrain_flow.py:retrain_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true

  # ── Drift — déclenché manuellement après simulate_production.py
  # (ou via train.yml qui gère simulation + drift en une passe)
  - name: drift-check
    entrypoint: src/flows/drift_monitoring_flow.py:drift_monitoring_flow
    work_pool:
      name: default-process-pool
