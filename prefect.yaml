name: cac-mlops
prefect-version: "3.*"

# No remote build/push — flows run as local processes on the worker
build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ── ETL — manual or called from retrain ──────────────────────────────────────
  - name: etl
    entrypoint: src/flows/etl_flow.py:etl_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true

  # ── Train — manual trigger ────────────────────────────────────────────────────
  - name: train
    entrypoint: src/flows/train_flow.py:train_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true
      promote: true

  # ── Drift — déclenché manuellement depuis Prefect UI ou cockpit Gradio
  - name: drift-check
    entrypoint: src/flows/drift_monitoring_flow.py:drift_monitoring_flow
    work_pool:
      name: default-process-pool

  # ── Check new data — détection hebdo + chaîne complète si nouvelle année ─────
  # Lundi 8h : poll data.gouv.fr, fuzzy-match 4 URLs (plus de FILENAMES hardcodés).
  # Si 4/4 matchés → ETL (download par URL) → train (champion sans promote)
  #                 → deploy-vps-flow (gate manuelle) → deploy-kapsule-flow (auto).
  # Si < 4/4 → email alerte + stop (ONISR a changé ses conventions de nommage).
  - name: check-new-data
    entrypoint: src/flows/check_new_data_flow.py:check_new_data_flow
    work_pool:
      name: default-process-pool
    schedules:
      - cron: "0 8 * * 1"
        timezone: "Europe/Paris"
        active: true

  # ── Update model — Trigger 3 : nouveau blueprint DS (deploy.yml détecte le changement)
  # Extract blueprint MLflow explore → train → gate → promote si meilleur que @Production
  - name: update-model
    entrypoint: src/flows/update_model_flow.py:update_model_flow
    work_pool:
      name: default-process-pool
    parameters:
      cumul: true

  # ── Deploy VPS — déclenché par GitHub Actions (CI) ou manuellement ───────────
  # Avec champion/metrics/year : annual update (promote après gate).
  # Sans ces params : deploy code seul (gate avant Kapsule uniquement).
  - name: deploy-vps
    entrypoint: src/flows/deploy_vps_flow.py:deploy_vps_flow
    work_pool:
      name: default-process-pool
    parameters:
      sha_tag: ""

  # ── Deploy Kapsule — rolling update si cluster actif ─────────────────────────
  # Appelé automatiquement par deploy-vps-flow après la gate.
  # Peut aussi être déclenché manuellement (ex : resync après kapsule-up).
  - name: deploy-kapsule
    entrypoint: src/flows/deploy_kapsule_flow.py:deploy_kapsule_flow
    work_pool:
      name: default-process-pool

  # ── Full retrain — tous les cycles depuis zéro (après reset-flow) ─────────────
  # Auto-détecte les années depuis les tags DVC (data-v1, data-v2, ...)
  # Utilise l'algorithme du modèle @Production actuel pour chaque cycle.
  - name: full-retrain
    entrypoint: src/flows/full_retrain_flow.py:full_retrain_flow
    work_pool:
      name: default-process-pool
    parameters:
      max_sim_rows: 2000

  # ── Reset (RAZ) — options indépendantes par composant + full_reset ───────────
  # Le Cockpit passe toujours les 8 booléens explicitement ; ces valeurs ne
  # servent que si le déploiement est lancé sans paramètres (Prefect UI, CLI).
  - name: reset
    entrypoint: src/flows/reset_flow.py:reset_flow
    work_pool:
      name: default-process-pool
    parameters:
      clear_predictions: true
      clear_drift: true
      clear_mlflow: false
      clear_postgres_full: false
      clear_minio: false
      clear_grafana: false
      clear_loki: false
      full_reset: false

  # ── Kapsule Up — crée node pool + déploie stack K8s ─────────────────────────
  # node_type : type de nœud Scaleway (BASIC3-X2C-8G, GP1-S, ...)
  # node_count : nombre de nœuds (2 par défaut)
  - name: kapsule-up
    entrypoint: src/flows/kapsule_up_flow.py:kapsule_up_flow
    work_pool:
      name: default-process-pool
    parameters:
      node_type: "BASIC3-X2C-8G"
      node_count: 2

  # ── Kapsule Down — supprime namespace + node pools ───────────────────────────
  - name: kapsule-down
    entrypoint: src/flows/kapsule_down_flow.py:kapsule_down_flow
    work_pool:
      name: default-process-pool

  # ── Test API — 5 tests (health, JWT, 401, 200, rate-limit) ──────────────────
  - name: test-api
    entrypoint: src/flows/test_api_flow.py:test_api_flow
    work_pool:
      name: default-process-pool

  # ── Diag — snapshot VPS (docker, disk, ports) ────────────────────────────────
  - name: diag
    entrypoint: src/flows/diag_flow.py:diag_flow
    work_pool:
      name: default-process-pool

  # ── Disk cleanup — nettoyage quotidien Docker (containers, dangling images, builder cache)
  - name: disk-cleanup
    entrypoint: src/flows/disk_cleanup_flow.py:disk_cleanup_flow
    work_pool:
      name: default-process-pool
    schedules:
      - cron: "0 2 * * *"   # 02h00 UTC tous les jours
        timezone: "UTC"
        active: true
