name: cac-mlops
prefect-version: "3.*"

# No remote build/push — flows run as local processes on the worker
build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ── ETL — manual or called from retrain ──────────────────────────────────────
  - name: etl
    entrypoint: src/flows/etl_flow.py:etl_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true

  # ── Train — manual trigger ────────────────────────────────────────────────────
  - name: train
    entrypoint: src/flows/train_flow.py:train_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true
      promote: true

  # ── Retrain annuel — déclenché manuellement quand les données ONISR de l'année N
  # sont disponibles (~juin de l'année N+2). Pas de cron : réentraîner sur les
  # mêmes données produirait un modèle identique.
  - name: retrain-annual
    entrypoint: src/flows/retrain_flow.py:retrain_flow
    work_pool:
      name: default-process-pool
    parameters:
      year: 2023
      cumul: true

  # ── Drift — déclenché manuellement après simulate_production.py
  # (ou via train.yml qui gère simulation + drift en une passe)
  - name: drift-check
    entrypoint: src/flows/drift_monitoring_flow.py:drift_monitoring_flow
    work_pool:
      name: default-process-pool

  # ── Check new data — détection hebdo de nouvelles données ONISR ─────────────
  # Vérifie data.gouv.fr chaque lundi à 8h (Europe/Paris).
  # Si nouvelle année détectée : logs le plan d'action (mise à jour import_raw_data.py
  # + lancement manual de full-retrain). Ne déclenche PAS le retrain automatiquement
  # (nommage ONISR imprévisible — validation humaine requise).
  - name: check-new-data
    entrypoint: src/flows/check_new_data_flow.py:check_new_data_flow
    work_pool:
      name: default-process-pool
    schedules:
      - cron: "0 8 * * 1"
        timezone: "Europe/Paris"
        active: true

  # ── Full retrain — tous les cycles depuis zéro (après reset-flow) ─────────────
  # Auto-détecte les années depuis les tags DVC (data-v1, data-v2, ...)
  # Utilise l'algorithme du modèle @Production actuel pour chaque cycle.
  - name: full-retrain
    entrypoint: src/flows/full_retrain_flow.py:full_retrain_flow
    work_pool:
      name: default-process-pool
    parameters:
      max_sim_rows: 2000

  # ── Reset (RAZ) — vide la table predictions + rapports drift ─────────────────
  # clear_mlflow=true supprime tous les runs et versions MLflow de
  # accidents_severity (accidents_severity_explore préservé).
  - name: reset
    entrypoint: src/flows/reset_flow.py:reset_flow
    work_pool:
      name: default-process-pool
    parameters:
      clear_predictions: true
      clear_drift: true
      clear_mlflow: false

  # ── Kapsule Up — crée node pool + déploie stack K8s ─────────────────────────
  # node_type : type de nœud Scaleway (BASIC3-X2C-8G, GP1-S, ...)
  # node_count : nombre de nœuds (2 par défaut)
  - name: kapsule-up
    entrypoint: src/flows/kapsule_up_flow.py:kapsule_up_flow
    work_pool:
      name: default-process-pool
    parameters:
      node_type: "BASIC3-X2C-8G"
      node_count: 2

  # ── Kapsule Down — supprime namespace + node pools ───────────────────────────
  - name: kapsule-down
    entrypoint: src/flows/kapsule_down_flow.py:kapsule_down_flow
    work_pool:
      name: default-process-pool

  # ── Test API — 5 tests (health, JWT, 401, 200, rate-limit) ──────────────────
  - name: test-api
    entrypoint: src/flows/test_api_flow.py:test_api_flow
    work_pool:
      name: default-process-pool

  # ── Diag — snapshot VPS (docker, disk, ports) ────────────────────────────────
  - name: diag
    entrypoint: src/flows/diag_flow.py:diag_flow
    work_pool:
      name: default-process-pool
